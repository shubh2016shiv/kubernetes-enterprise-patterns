# =============================================================================
# FILE:    04-access-control-rbac.yaml
# KIND:    ServiceAccount, Role, RoleBinding
# PURPOSE: Give each tier an explicit Kubernetes identity and least-privilege
#          API permissions.
# WHEN:    app_k8_deployment - apply before any workload pods are created.
# ENTERPRISE EQUIVALENT: Platform teams use namespace-scoped service accounts,
#                        RBAC, workload identity, and policy engines so every
#                        component has a clear "who can do what to what" boundary.
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  # CONFIGURATION EXPLANATION A ServiceAccount is a Kubernetes identity for code running inside the cluster,
  # not a human user account. The backend gets its own identity so permission rules can be written for this API
  # without giving the same access to the frontend, database, or backup jobs.
  name: patient-record-api
  namespace: patient-record-system
  annotations:
    # ENTERPRISE EMPHASIS: This is the backend workload identity. In production,
    # this may map to a cloud IAM identity through IRSA on EKS, Workload Identity
    # on GKE, or Managed Identity on AKS.
    description: "Identity used by the FastAPI backend pods"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  # CONFIGURATION EXPLANATION The frontend nginx pods get a separate ServiceAccount even though they do not need
  # Kubernetes API access. Separate identities make future permissions explicit instead of reusing one powerful
  # identity across every tier.
  name: patient-intake-ui
  namespace: patient-record-system
  annotations:
    description: "Identity used by the nginx frontend pods"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  # CONFIGURATION EXPLANATION The database StatefulSet has its own Kubernetes identity so database runtime
  # permissions can be reviewed separately from the API's permissions. This mirrors production least-privilege
  # design: each component gets only what it needs.
  name: patient-record-database
  namespace: patient-record-system
  annotations:
    description: "Identity used by the database StatefulSet pod"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  # CONFIGURATION EXPLANATION The schema initializer is a one-time Job, meaning a pod that runs to completion.
  # Giving it a dedicated identity helps production teams audit migration-like actions separately from normal
  # request-serving application pods.
  name: patient-schema-initializer
  namespace: patient-record-system
  annotations:
    description: "Identity used by the one-shot database schema Job"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  # CONFIGURATION EXPLANATION Backup jobs need a different operational identity from the application. That keeps
  # data-protection activity auditable and avoids teaching the risky habit of using the backend identity for
  # database maintenance work.
  name: patient-database-backup-runner
  namespace: patient-record-system
  annotations:
    description: "Identity used by scheduled database backup Jobs"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  # CONFIGURATION EXPLANATION Role-Based Access Control (RBAC) is Kubernetes' permission system: it answers
  # "who can do which action on which object?" A Role is the namespace-scoped permission document, and this one
  # limits the backend identity to only the ConfigMap and Secret it needs.
  name: patient-record-api-runtime-reader
  namespace: patient-record-system
rules:
  # ENTERPRISE EMPHASIS: This Role documents the backend's intended Kubernetes
  # API access. The current code reads env vars injected by kubelet, so it does
  # not actively call the API server. The permission is intentionally narrow to
  # show that "backend pod" does not mean "can read every Secret."
  - apiGroups:
      - ""
    # CONFIGURATION EXPLANATION `configmaps` are non-secret configuration objects, and `resourceNames` narrows
    # this rule to only the backend runtime ConfigMap. The backend does not get permission to list every ConfigMap.
    resources:
      - configmaps
    resourceNames:
      - patient-record-api-runtime-config
    verbs:
      - get
  - apiGroups:
      - ""
    # CONFIGURATION EXPLANATION `secrets` can contain sensitive values. This rule is deliberately limited to the
    # database credentials Secret, teaching that a pod identity should never be allowed to read unrelated secrets.
    resources:
      - secrets
    resourceNames:
      - patient-record-database-credentials
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  # CONFIGURATION EXPLANATION A RoleBinding connects a Role to a subject. Here it attaches the narrow read
  # permissions above to only the backend ServiceAccount, which is how Kubernetes answers "who can do what?"
  name: patient-record-api-runtime-reader-binding
  namespace: patient-record-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: patient-record-api-runtime-reader
subjects:
  - kind: ServiceAccount
    name: patient-record-api
    namespace: patient-record-system
