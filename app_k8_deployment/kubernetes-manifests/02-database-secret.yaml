# =============================================================================
# FILE:    02-database-secret.yaml
# KIND:    Secret
# PURPOSE: Store fake database credentials used by the local learning system.
# WHEN:    app_k8_deployment - apply before the database StatefulSet and API.
# ENTERPRISE EQUIVALENT: Real credentials should come from External Secrets
#                        Operator backed by AWS Secrets Manager, GCP Secret
#                        Manager, Azure Key Vault, or HashiCorp Vault.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: patient-record-database-credentials
  namespace: patient-record-system
type: Opaque
stringData:
  # ENTERPRISE EMPHASIS: These are intentionally fake lab values. Kubernetes
  # Secrets are base64-encoded in the API, not automatically end-to-end encrypted
  # for every operator with access. Do not commit real passwords to Git.
  mysql-root-password: "local-root-password"
  mysql-database: "patient_records"
  mysql-user: "patient_app"
  mysql-password: "patient-app-password"

