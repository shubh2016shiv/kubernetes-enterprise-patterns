# =============================================================================
# FILE:    07-database-schema-initialization-job.yaml
# KIND:    Job
# PURPOSE: Create the patient_records table before the backend receives traffic.
# WHEN:    app_k8_deployment - run after the database StatefulSet is Ready and
#          before the backend Deployment is created.
# ENTERPRISE EQUIVALENT: Production teams usually run schema changes with
#                        Flyway, Liquibase, Alembic, or controlled migration Jobs
#                        in CI/CD before application rollout.
# =============================================================================

apiVersion: batch/v1
kind: Job
metadata:
  # CONFIGURATION EXPLANATION A Job creates one or more pods that run until a task completes. This Job owns the
  # database schema creation step so table setup is visible in Kubernetes Events and logs instead of hidden inside
  # normal API request handling.
  name: patient-record-schema-initializer
  namespace: patient-record-system
  labels:
    app: patient-record-schema-initializer
    tier: database
spec:
  # CONFIGURATION EXPLANATION `backoffLimit: 3` lets Kubernetes retry transient database startup timing failures,
  # but still fails the release clearly if schema creation cannot succeed after a few attempts.
  backoffLimit: 3
  # CONFIGURATION EXPLANATION Finished Jobs are kept for one hour so learners can inspect logs and status, then
  # cleaned up to avoid old run objects cluttering the namespace.
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: patient-record-schema-initializer
        tier: database
    spec:
      # CONFIGURATION EXPLANATION The schema initializer has its own ServiceAccount so database setup work can be
      # audited separately from the long-running API pods.
      serviceAccountName: patient-schema-initializer
      # CONFIGURATION EXPLANATION `Never` means Kubernetes should not restart the same container inside the pod.
      # Failed attempts are represented as new Job retries, which makes release failure history easier to inspect.
      restartPolicy: Never
      securityContext:
        seccompProfile:
          # CONFIGURATION EXPLANATION RuntimeDefault applies the container runtime's normal Linux system-call filter
          # to this migration-like pod, keeping even short-lived operational jobs under baseline security controls.
          type: RuntimeDefault
      containers:
        - name: schema-init
          # CONFIGURATION EXPLANATION The Job uses the same MariaDB client image version as the database server.
          # That avoids client/server compatibility surprises during schema initialization.
          image: mariadb:11.8.6
          # CONFIGURATION EXPLANATION IfNotPresent works for the local lab and avoids repeated pulls. Production
          # jobs should use pinned images from a trusted registry so migration tooling is reproducible.
          imagePullPolicy: IfNotPresent
          securityContext:
            # CONFIGURATION EXPLANATION This one-shot job only needs to run the database client, so it blocks
            # privilege escalation and drops Linux capabilities to reduce what a compromised job could do.
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: MARIADB_DATABASE
              valueFrom:
                secretKeyRef:
                  # CONFIGURATION EXPLANATION The schema job reads the database name, user, and password from the
                  # same Secret as the API and database. That keeps the initialized schema aligned with the app.
                  name: patient-record-database-credentials
                  key: mysql-database
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: patient-record-database-credentials
                  key: mysql-user
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: patient-record-database-credentials
                  key: mysql-password
          command:
            # CONFIGURATION EXPLANATION The command waits up to 30 attempts with 5 seconds between attempts before
            # creating the table. This teaches a production release pattern: migration jobs should tolerate normal
            # dependency startup delay but fail visibly when the dependency never becomes ready.
            - /bin/sh
            - -c
            - |
              set -eu

              echo "Waiting for patient-record-database-service to accept SQL connections..."
              for attempt in $(seq 1 30); do
                if mariadb \
                  -h patient-record-database-service \
                  -u"${MARIADB_USER}" \
                  -p"${MARIADB_PASSWORD}" \
                  "${MARIADB_DATABASE}" \
                  -e "SELECT 1;" >/dev/null 2>&1; then
                  break
                fi
                echo "Database is not ready yet. Attempt ${attempt}/30."
                sleep 5
              done

              # ENTERPRISE EMPHASIS: Schema creation is a release lifecycle step,
              # not hidden inside request handling. If this Job fails, the backend
              # readiness probe will also fail because the table does not exist.
              mariadb \
                -h patient-record-database-service \
                -u"${MARIADB_USER}" \
                -p"${MARIADB_PASSWORD}" \
                "${MARIADB_DATABASE}" <<'SQL'
              CREATE TABLE IF NOT EXISTS patient_records (
                patient_id BIGINT AUTO_INCREMENT PRIMARY KEY,
                full_name VARCHAR(160) NOT NULL,
                date_of_birth DATE NOT NULL,
                gender VARCHAR(32) NOT NULL,
                phone_number VARCHAR(40) NOT NULL,
                email_address VARCHAR(160) NULL,
                primary_symptom VARCHAR(255) NOT NULL,
                triage_priority VARCHAR(32) NOT NULL,
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
              SQL

              echo "Schema initialization completed."
          resources:
            # CONFIGURATION EXPLANATION Schema creation is short-lived and lightweight in this lab, so it receives
            # small requests and limits. Production migrations may need separate sizing because large schema changes
            # can consume meaningful database and client resources.
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
