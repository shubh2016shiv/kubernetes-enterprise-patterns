# =============================================================================
# FILE:    10-frontend-deployment.yaml
# KIND:    Deployment
# PURPOSE: Run the nginx frontend that serves the patient intake form.
# WHEN:    app_k8_deployment - after backend Service exists.
# ENTERPRISE EQUIVALENT: A production frontend may be served from CDN/object
#                        storage, an ingress controller, or a web Deployment.
#                        The Kubernetes lifecycle controls remain similar.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  # CAN BE CHANGED: Deployment and Service selector name. Example: `patient-portal-ui`.
  # If changed, update 11-frontend-service.yaml and UI_IMAGE in build-application-images_1.sh.
  name: patient-intake-ui
  # CAN BE CHANGED: Must match namespace in 00-namespace.yaml and NAMESPACE in scripts.
  namespace: patient-record-system
  labels:
    app: patient-intake-ui
    tier: frontend
    app.kubernetes.io/name: patient-intake-ui
    app.kubernetes.io/component: frontend-ui
    app.kubernetes.io/part-of: patient-record-system
    app.kubernetes.io/version: "1.0.0"
spec:
  # CAN BE CHANGED: Example `1` for testing or `3` for production HA.
  # Replica count affects resource usage and availability during updates.
  replicas: 2
  # CAN BE CHANGED: Number of prior ReplicaSet revisions to keep for rollback.
  # Example: `3` for quick rollback, `10` for extended rollback history.
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: patient-intake-ui
      tier: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: patient-intake-ui
        tier: frontend
        app.kubernetes.io/name: patient-intake-ui
        app.kubernetes.io/version: "1.0.0"
    spec:
      serviceAccountName: patient-intake-ui
      automountServiceAccountToken: false
      securityContext:
        # ENTERPRISE EMPHASIS: The nginx frontend does not need root privileges
        # or Kubernetes API access. UID 101 is the nginx user in the alpine image.
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: patient-intake-ui
      containers:
        - name: ui
          # CAN BE CHANGED: Frontend image and tag. Example: `patient-portal-ui:2.0.0`.
          # Must match UI_IMAGE in build-application-images_1.sh and referenced in
          # load-images-into-kind_2.sh. Use semver format: imagename:X.Y.Z
          image: patient-intake-ui:1.0.0
          # CAN BE CHANGED: Use `Always` for remote registries, `IfNotPresent` for local kind.
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
