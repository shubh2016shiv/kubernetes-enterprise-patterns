# =============================================================================
# FILE:    03-backend-configmap.yaml
# KIND:    ConfigMap
# PURPOSE: Provide non-sensitive runtime configuration for the FastAPI backend.
# WHEN:    app_k8_deployment - apply before patient-record-api Deployment.
# ENTERPRISE EQUIVALENT: The same data would usually be managed as environment
#                        overlays in Helm, Kustomize, Argo CD, or Flux.
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  # CONFIGURATION EXPLANATION A ConfigMap is a Kubernetes object for non-secret key-value configuration. This
  # one feeds environment variables into the FastAPI backend so the same container image can run in local,
  # staging, or production with different settings.
  name: patient-record-api-runtime-config
  namespace: patient-record-system
data:
  # ENTERPRISE EMPHASIS: The app points at a Service DNS name, not a database pod
  # IP. Pods move; Services provide the stable identity.
  # CONFIGURATION EXPLANATION This host is the database Service DNS name. A Service is a stable virtual address
  # in front of pods, so the API does not need to know the database pod name or IP when Kubernetes replaces it.
  DATABASE_HOST: "patient-record-database-service"
  # CONFIGURATION EXPLANATION Port 3306 is the standard MySQL/MariaDB listener and must match the database
  # Service and container port. A mismatch makes the API healthy as a process but unable to reach SQL.
  DATABASE_PORT: "3306"
  # CONFIGURATION EXPLANATION The connect timeout bounds how long the API waits for database connection attempts.
  # Short bounded failures let readiness fail quickly instead of tying up API workers during database trouble.
  DATABASE_CONNECT_TIMEOUT_SECONDS: "5"
  # CONFIGURATION EXPLANATION These app identity values appear in responses and logs. They help operators prove
  # which service, environment, log verbosity, and version are running during rollout or incident review.
  APP_NAME: "patient-record-api"
  APP_ENVIRONMENT: "local-kind"
  LOG_LEVEL: "INFO"
  API_VERSION: "1.0.0"
