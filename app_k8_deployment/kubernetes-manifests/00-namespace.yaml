# =============================================================================
# FILE:    00-namespace.yaml
# KIND:    Namespace
# PURPOSE: Create the isolation boundary for the patient record 3-tier system.
# WHEN:    app_k8_deployment - apply before all application resources.
# ENTERPRISE EQUIVALENT: In EKS, GKE, AKS, or OpenShift, namespaces usually map
#                        to application environments, teams, or bounded domains
#                        and are managed by GitOps plus platform guardrails.
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  # CAN BE CHANGED: Example `patient-intake-system` or `healthcare-api`.
  # If changed, must update NAMESPACE in all scripts in deployment-lifecycle/ and
  # the namespace value in all other manifests (01-resource-governance.yaml through 17-observability-service-monitor.yaml).
  # CONFIGURATION EXPLANATION A namespace is a named boundary inside one Kubernetes cluster. This value groups
  # the patient-record application's pods, Services, Secrets, storage requests, policies, and cleanup commands
  # so learners can manage one application without accidentally touching another team or environment.
  name: patient-record-system
  labels:
    # CAN BE CHANGED: Application name. Example `patient-intake-ui` or `healthcare-records-app`.
    # If changed, update the same label in all other manifests.
    # CONFIGURATION EXPLANATION This shared application label lets humans and tools select the whole system as
    # one unit for inventory, dashboards, cost reports, and policy rules. It must stay consistent across files.
    app.kubernetes.io/name: patient-record-system
    app.kubernetes.io/part-of: healthcare-platform-learning
    # CAN BE CHANGED: Environment label. Example `production`, `staging`, or `local-development`.
    # Used for policy enforcement and cost attribution.
    # CONFIGURATION EXPLANATION `local-kind` tells readers and automation that this namespace is for the local
    # kind cluster, not staging or production. Enterprise clusters rely on environment labels for audit filters,
    # policy decisions, and cost attribution.
    environment: local-kind
  annotations:
    description: "Namespace for the enterprise-style patient record 3-tier deployment"
