# =============================================================================
# FILE:    nginx.conf
# PURPOSE: Serve the patient intake form and proxy API calls to the backend
#          Kubernetes Service.
# USAGE:   Included by the patient-intake-ui container image.
# WHEN:    app_k8_deployment - frontend tier runtime configuration.
# PREREQS: The patient-record-api Service exists in the same namespace.
# OUTPUT:  Browser requests to /api/* are routed to the backend Service.
#
# ARCHITECTURE:
#   Browser (http://localhost:30001)
#       ↓ [NodePort Service 30001 → ClusterIP 8080]
#   nginx container listens 8080
#       ├─ location / (static files)
#       └─ location /api/ (proxy to backend)
#
# FOR LEARNERS: See NGINX_GUIDE.md for detailed explanation of each directive.
#
# LEARNER NOTE: Do not memorize this file line by line.
# The important skill is understanding the intent of each standard NGINX pattern:
#   1. listen      - which port the container accepts traffic on.
#   2. root/index  - where the built frontend files live inside the image.
#   3. location /  - how static frontend routes are served.
#   4. try_files   - the standard SPA fallback so browser refreshes work.
#   5. location /api/ and proxy_pass - how the UI reaches the backend Service.
#   6. proxy headers - how the backend receives original host, IP, and protocol.
#
# ENTERPRISE NOTE:
# These are standard, enterprise-recognizable NGINX ideas. Real companies usually
# keep a trusted baseline like this and adjust it per application. What changes
# across enterprises is the surrounding platform: TLS may terminate at an Ingress
# Controller or cloud load balancer, traffic may pass through a service mesh, and
# security headers, caching, logging, and observability may be stricter. The core
# idea remains the same: NGINX serves the frontend and forwards API traffic to a
# stable backend address instead of hard-coding pod IPs.
# =============================================================================

server {
    # LISTEN: What port does nginx listen on INSIDE the container?
    # Port 8080 is non-privileged (no root needed) and matches the Service port.
    # Browser → NodePort 30001 → Service 8080 → Container 8080
    listen 8080;

    # SERVER_NAME: What hostnames does this server respond to?
    # "_" is a wildcard matching ANY hostname. In enterprise, this would be
    # a specific domain like "patient-intake.acme.com".
    server_name _;

    # ROOT: Where are static files stored?
    # When browser requests /index.html, nginx looks in:
    # /usr/share/nginx/html/index.html
    # Built by Dockerfile: COPY --from=builder /app/dist /usr/share/nginx/html
    root /usr/share/nginx/html;

    # INDEX: What file to serve when requesting a directory?
    # Browser: http://localhost:30001/        (no filename)
    # nginx: Serve /usr/share/nginx/html/index.html
    index index.html;

    # ═════════════════════════════════════════════════════════════════════════
    # LOCATION BLOCK 1: Static Files (HTML, CSS, JS)
    # Matches: /                    (and everything else not matched below)
    # Serves:  Files from root directory
    # ═════════════════════════════════════════════════════════════════════════
    location / {
        # TRY_FILES: Single Page Application (SPA) pattern
        # Used by React, Vue, Angular — all requests should load index.html,
        # then JavaScript handles routing.
        #
        # FLOW:
        # 1. Browser requests /patients
        # 2. nginx looks for /usr/share/nginx/html/patients (doesn't exist)
        # 3. try_files says: "Fall back to /index.html"
        # 4. Serve index.html
        # 5. JavaScript in index.html reads the URL and renders the page
        #
        # ANALOGY: Instead of having separate patient.html, doctor.html files,
        # all URLs load the same index.html, and JavaScript decides what to show.
        try_files $uri /index.html;
    }

    # ═════════════════════════════════════════════════════════════════════════
    # LOCATION BLOCK 2: API Requests to Backend
    # Matches: /api/*
    # Proxies: Requests to the FastAPI backend Service
    # ═════════════════════════════════════════════════════════════════════════
    location /api/ {
        # PROXY_PASS: Forward requests to a different server (the backend)
        # Browser: /api/patients
        # nginx forwards to: http://patient-record-api-service:8080/patients
        #
        # COMPONENTS:
        # - patient-record-api-service = Kubernetes Service DNS name
        #     Kubernetes resolves this to the Service's ClusterIP
        #     ClusterIP load-balances across backend pods
        # - :8080 = Backend port (where FastAPI listens)
        # - / (trailing slash) = Strips /api from the path
        #     Without it: /api/patients → /api/patients (WRONG)
        #     With it: /api/patients → /patients (CORRECT)
        #
        # ENTERPRISE EMPHASIS: The UI does not call pod IPs or hard-coded node
        # addresses. It calls a stable Kubernetes Service DNS name. In EKS/GKE/AKS,
        # this is still the standard east-west service discovery pattern, often
        # wrapped with service mesh policy and telemetry.
        proxy_pass http://patient-record-api-service:8080/;

        # PROXY_HTTP_VERSION: HTTP version for proxying
        # 1.1 = Connection pooling (multiple requests over same connection)
        # 1.0 = New connection per request (inefficient)
        # Performance: 1.1 is 3x faster for multiple API calls.
        proxy_http_version 1.1;

        # PROXY_SET_HEADER Host: Preserve original hostname
        # WITHOUT: Backend sees "patient-record-api-service:8080"
        # WITH: Backend sees "localhost:30001" (what browser used)
        # Needed for: Host validation, CORS, virtual hosting, logging.
        proxy_set_header Host $host;

        # PROXY_SET_HEADER X-Forwarded-For: Preserve client IP
        # WITHOUT: Backend sees nginx IP (127.0.0.1 or internal)
        # WITH: Backend knows real client IP (192.168.1.100)
        # Needed for: Logging "who made the request", rate limiting, geolocation,
        # security rules (IP-based blocking), audit trails.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # PROXY_SET_HEADER X-Forwarded-Proto: Preserve protocol (HTTP or HTTPS)
        # WITHOUT: Browser uses HTTPS, nginx terminates TLS and forwards HTTP.
        #   Backend sees "HTTP" and might reject as insecure.
        # WITH: Backend sees "HTTPS" even though connection to backend is HTTP.
        #   Backend knows TLS was used by client, allows the request.
        # Needed for: Security rules, protocol validation, logging.
        # In enterprise, TLS termination is standard:
        #   Ingress Controller / Load Balancer handles HTTPS
        #   Proxies HTTP internally (faster, within trusted network)
        #   Sets X-Forwarded-Proto so backend knows original was HTTPS
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
