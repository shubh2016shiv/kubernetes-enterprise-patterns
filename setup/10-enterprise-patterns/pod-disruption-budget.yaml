# =============================================================================
# FILE:    pod-disruption-budget.yaml
# KIND:    PodDisruptionBudget
# PURPOSE: Protect the inference gateway from losing too many replicas during
#          voluntary maintenance such as node drains or cluster upgrades.
# WHEN:    setup/10-enterprise-patterns - after Deployments and health checks
#          have shown why ready replicas matter.
# ENTERPRISE EQUIVALENT: Production services on EKS, GKE, and AKS commonly use
#                        PDBs so platform maintenance does not accidentally
#                        take down every replica of an application.
# =============================================================================

apiVersion: policy/v1
kind: PodDisruptionBudget

metadata:
  # CONFIGURATION EXPLANATION `inference-gateway-pdb` is the Kubernetes API name for this PodDisruptionBudget.
  # Humans and automation use this name in kubectl commands, audit logs, and incident
  # runbooks, so changing it must be deliberate and coordinated with scripts that
  # reference it.
  name: inference-gateway-pdb
  # CONFIGURATION EXPLANATION `applications` is the namespace where this object is stored. A namespace is a
  # named boundary inside one cluster for permissions, quotas, network rules, and
  # cleanup; putting this object in the wrong namespace makes selectors and scripts
  # miss it.
  namespace: applications
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/component: availability-policy
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Keep at least two gateway pods available during voluntary disruptions."

spec:
  # minAvailable means Kubernetes should reject voluntary evictions that would
  # leave fewer than this many matching pods Ready.
  #
  # The gateway Deployment starts with 3 replicas. minAvailable: 2 means:
  #   - one pod may be voluntarily evicted during maintenance
  #   - two pods should remain Ready for traffic
  #   - if only two are healthy, node drain should wait or fail
  # CONFIGURATION EXPLANATION `2` is the minimum number of matching pods that should stay available during
  # voluntary disruptions such as node drains. Production teams use this to avoid
  # maintenance causing downtime.
  minAvailable: 2

  selector:
    matchLabels:
      # CONFIGURATION EXPLANATION `app: inference-gateway` is a label used as a matching contract. Deployment
      # selectors, pod template labels, and Service selectors must agree on this
      # value, or Kubernetes will create objects that cannot find the pods they are
      # supposed to manage or route to.
      app: inference-gateway
      tier: backend

# =============================================================================
# IMPORTANT BOUNDARY
#
# PDB protects against voluntary disruptions, not all failures.
#
# Voluntary disruption examples:
#   - kubectl drain node
#   - cluster autoscaler removing a node
#   - managed node group upgrade
#
# Involuntary disruption examples:
#   - node power loss
#   - kernel panic
#   - container crash
#
# PDB cannot stop involuntary failures. It only tells Kubernetes-controlled
# maintenance to preserve availability when possible.
# =============================================================================
