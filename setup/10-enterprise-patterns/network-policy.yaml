# =============================================================================
# FILE:    network-policy.yaml
# KIND:    NetworkPolicy
# PURPOSE: Demonstrate zero-trust pod networking for the gateway/backend
#          learning application.
# WHEN:    setup/10-enterprise-patterns - after Services and health checks have
#          shown how traffic normally flows.
# ENTERPRISE EQUIVALENT: Calico, Cilium, Azure CNI policy, or cloud-supported
#                        network policy enforcement on EKS, GKE, and AKS.
# =============================================================================

# =============================================================================
# POLICY 1: DEFAULT DENY
#
# Basic idea:
#   Without NetworkPolicy, Kubernetes networking is usually open inside the
#   cluster. Any pod can attempt to talk to any other pod.
#
# Enterprise idea:
#   Start from "deny everything" and then allow only known-good traffic.
#
# Important local note:
#   NetworkPolicy enforcement depends on the CNI plugin. kind's default CNI may
#   accept this object but not enforce it. The manifest is still production-style.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: default-deny-applications
  namespace: applications
  labels:
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Deny all ingress and egress until specific allow policies open required paths."

spec:
  # Empty podSelector means "all pods in this namespace."
  podSelector: {}

  # Listing both directions activates default deny for incoming and outgoing
  # traffic on selected pods.
  policyTypes:
    - Ingress
    - Egress

---
# =============================================================================
# POLICY 2: ALLOW DNS EGRESS
#
# Why this must exist:
#   Pods need DNS to resolve Service names such as risk-profile-api-clusterip.
#   A default-deny egress policy can accidentally break DNS if you forget this.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: allow-dns-egress
  namespace: applications
  labels:
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Allow pods to query DNS after default-deny egress is enabled."

spec:
  podSelector: {}
  policyTypes:
    - Egress

  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# =============================================================================
# POLICY 3: ALLOW INGRESS TO THE GATEWAY
#
# Why:
#   The gateway is the front door of this learning app. It must be reachable
#   from trusted callers while the backend remains private.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: allow-gateway-ingress
  namespace: applications
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Allow trusted traffic to reach the inference gateway pods."

spec:
  podSelector:
    matchLabels:
      app: inference-gateway
      tier: backend

  policyTypes:
    - Ingress

  ingress:
    - from:
        # LOCAL SHORTCUT:
        # Allow pod callers from the applications namespace. This supports debug
        # pods and service-to-service exercises in the learning lab.
        - namespaceSelector:
            matchLabels:
              environment: development
        # LOCAL SHORTCUT:
        # The gateway is the front door service in this lab. If your local CNI
        # enforces NetworkPolicy, this allows NodePort or port-forward style
        # traffic to reach the gateway pods. In enterprise, narrow this to the
        # ingress controller namespace, load balancer source ranges, or service
        # mesh gateway identity instead of allowing every source IP.
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        # The gateway container listens on 8080. The Service exposes port 80 but
        # NetworkPolicy protects pod traffic at the container port.
        - protocol: TCP
          port: 8080

---
# =============================================================================
# POLICY 4: ALLOW GATEWAY TO CALL BACKEND
#
# Why:
#   The gateway needs exactly one east-west path: call risk-profile-api pods.
#   The backend should not be open to every pod in the namespace.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: allow-gateway-to-risk-api
  namespace: applications
  labels:
    app.kubernetes.io/name: risk-profile-api
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Allow gateway pods to call risk-profile-api pods."

spec:
  podSelector:
    matchLabels:
      app: risk-profile-api
      tier: backend

  policyTypes:
    - Ingress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: inference-gateway
              tier: backend
      ports:
        # The backend container listens on named port http, which maps to 8081
        # in risk-profile-api-deployment.yaml.
        - protocol: TCP
          port: 8081

---
# =============================================================================
# POLICY 5: ALLOW GATEWAY EGRESS TO BACKEND
#
# Why:
#   If egress is default-denied, allowing backend ingress is not enough. The
#   caller also needs permission to send traffic out.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: allow-gateway-egress-to-risk-api
  namespace: applications
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Allow gateway pods to send traffic to risk-profile-api pods."

spec:
  podSelector:
    matchLabels:
      app: inference-gateway
      tier: backend

  policyTypes:
    - Egress

  egress:
    - to:
        - podSelector:
            matchLabels:
              app: risk-profile-api
              tier: backend
      ports:
        - protocol: TCP
          port: 8081

# =============================================================================
# DEBUGGING TIP
#
# NetworkPolicy uses labels. If traffic is blocked, inspect labels before
# changing ports:
#
#   kubectl get pods -n applications --show-labels
#   kubectl describe networkpolicy allow-gateway-to-risk-api -n applications
# =============================================================================
