# =============================================================================
# FILE: 10-enterprise-patterns/network-policy.yaml
# PURPOSE: NetworkPolicy — microsegmentation and zero-trust networking in K8s.
#
# DEFAULT KUBERNETES NETWORKING (THE INSECURE DEFAULT):
#   Without NetworkPolicy: EVERY pod can talk to EVERY other pod in the cluster.
#   A compromised pod in "monitoring" namespace can reach pods in "payments" namespace.
#   This is NOT acceptable in enterprise — especially in regulated industries
#   (finance, healthcare, government) where data isolation is legally required.
#
# WHAT NETWORK POLICY DOES:
#   NetworkPolicy enforces firewall rules at the Pod level using labels.
#   It defines WHICH pods can send/receive traffic TO/FROM WHICH other pods.
#   Rules are enforced by the CNI plugin (Calico, Cilium, Weave, etc.)
#   Note: kindnet (kind's default CNI) does NOT enforce NetworkPolicy.
#         For testing NetworkPolicy, you need Calico or Cilium in kind.
#         The YAMLs here are correct — they work in production with proper CNI.
#
# ZERO-TRUST PRINCIPLE:
#   "Never trust, always verify."
#   In K8s: Deny ALL traffic by default, then explicitly allow what's needed.
#   This is the "default-deny" posture used by security-conscious enterprises.
#
# TWO TYPES OF RULES:
#   ingress: Rules for INCOMING traffic TO the selected pods
#   egress:  Rules for OUTGOING traffic FROM the selected pods
# =============================================================================

# ─── STEP 1: DEFAULT DENY ALL (the foundation of zero-trust) ─────────────────
# This policy selects ALL pods in the namespace (empty podSelector = all pods)
# and blocks ALL ingress and egress traffic by default.
# Then we add specific allow policies ABOVE this baseline.
#
# In enterprise: apply this to every namespace as the FIRST policy.
# Then create specific allow policies for known good traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: applications
  annotations:
    description: "Default deny all ingress and egress. Override with specific allow policies."
    # Security baseline required by: PCI-DSS, SOC2, HIPAA, CIS Benchmark

spec:
  # podSelector: Which pods this policy applies to.
  # {} (empty) = ALL pods in the namespace
  podSelector: {}

  # policyTypes: Which traffic directions this policy governs.
  # Listing both Ingress and Egress activates denial of both directions.
  policyTypes:
    - Ingress   # Block all incoming traffic
    - Egress    # Block all outgoing traffic

  # No ingress or egress rules listed = deny everything
  # (rules lists absent = deny; rules lists present but empty = allow nothing;
  #  rules lists with entries = allow matching traffic)

---
# ─── STEP 2: Allow DNS egress (CoreDNS) ──────────────────────────────────────
# DNS is fundamental — without it, pods can't resolve service names.
# After a default-deny, DNS breaks. This policy re-enables it.
#
# ENTERPRISE INSIGHT: Always allow DNS before anything else.
# Many K8s outages caused by: "applied default-deny, forgot DNS" → apps can't start.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: applications
  annotations:
    description: "Allow all pods to reach CoreDNS for name resolution"

spec:
  podSelector: {}    # All pods in this namespace
  policyTypes:
    - Egress

  egress:
    - # Rule: allow UDP/TCP on port 53 to the kube-dns service in kube-system
      ports:
        - protocol: UDP
          port: 53      # Standard DNS port
        - protocol: TCP
          port: 53      # DNS over TCP (for large responses)
      # No `to` selector = allow to ANY destination
      # In practice, CoreDNS is in kube-system namespace

---
# ─── STEP 3: Allow nginx to receive HTTP traffic ──────────────────────────────
# Re-enables ingress to nginx pods specifically.
# Only allows traffic from pods labeled as "frontend" (e.g., an API gateway).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-http-ingress
  namespace: applications
  annotations:
    description: "Allow HTTP traffic into nginx pods from frontend tier"

spec:
  # This policy ONLY applies to pods with these labels
  podSelector:
    matchLabels:
      app: nginx
      tier: frontend

  policyTypes:
    - Ingress

  ingress:
    - # Rule: allow from pods with label tier=api-gateway within any namespace
      from:
        # namespaceSelector: Which namespaces can send traffic
        # (leave empty to allow from all namespaces matching podSelector)
        - namespaceSelector:
            matchLabels:
              # Allow from any namespace labeled "environment=development"
              # This is why we labeled our namespaces! (02-namespaces/namespaces.yaml)
              environment: development
          # podSelector within the namespaceSelector context:
          # The {} means ANY pod from matching namespaces
          podSelector: {}

        # Also allow from Prometheus scraping (monitoring namespace)
        - namespaceSelector:
            matchLabels:
              prometheus-scrape: "true"
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus

      ports:
        - protocol: TCP
          port: 80    # nginx HTTP port

---
# ─── STEP 4: Allow monitoring egress from nginx ───────────────────────────────
# Allow nginx pods to expose metrics to Prometheus in the monitoring namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-metrics-egress
  namespace: applications
  annotations:
    description: "Allow nginx pods to be scraped by Prometheus on metrics port"

spec:
  podSelector:
    matchLabels:
      app: nginx

  policyTypes:
    - Egress

  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              team: sre-team   # monitoring namespace label
      ports:
        - protocol: TCP
          port: 9090   # Prometheus port
