# =============================================================================
# FILE: 05-services/nodeport-service.yaml
# PURPOSE: NodePort Service — exposes the service on a fixed port on EVERY
#          node in the cluster, making it reachable from outside.
#
# WHEN TO USE NODEPORT vs LOADBALANCER:
#
#   NodePort:
#     + Works everywhere (local, bare-metal, cloud, kind)
#     + No external infrastructure required
#     - Not production-grade for external traffic (no health checks, no SSL termination)
#     - Port must be in 30000-32767 range (non-standard)
#     - If the node the client connects to is down → connection fails
#     USE: Local dev/testing, CI/CD, bare-metal demos
#
#   LoadBalancer:
#     + Production-ready external access
#     + Cloud LB is fault-tolerant (routes to healthy nodes)
#     + Supports SSL termination at LB level
#     - Requires cloud provider (or MetalLB on bare-metal)
#     - Each LoadBalancer service = one cloud LB = billing
#     - In large enterprises: 1 Ingress controller handles ALL external traffic,
#       backed by 1 LB — individual services use ClusterIP
#     USE: Production external-facing services in cloud environments
#
# ENTERPRISE REALITY: In most companies, NodePort is NOT used in production.
# The pattern is:
#   External traffic → Cloud LB → Ingress Controller (1 service of type LB)
#                                     → nginx-svc (ClusterIP)
#                                     → api-svc (ClusterIP)
#                                     → auth-svc (ClusterIP)
# One LB routes ALL traffic via path/host routing → massive cost saving.
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
  namespace: applications

  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/component: web-server-external

  annotations:
    description: "NodePort service for external access in dev/learning environment"

spec:
  type: NodePort

  # Same selector as ClusterIP — SAME pods, different exposure method
  # A pod can be exposed by MULTIPLE services simultaneously
  # (e.g., one ClusterIP for internal, one NodePort for testing)
  selector:
    app: nginx
    tier: frontend

  ports:
    - name: http
      protocol: TCP
      # port: what the Service listens on internally (ClusterIP port)
      port: 80
      # targetPort: the port on the Pod
      targetPort: http
      # nodePort: The port opened on EVERY node's IP address.
      # Range: 30000-32767 (configurable in API server with --service-node-port-range)
      # If you OMIT this, K8s randomly assigns one from the range.
      # ENTERPRISE RULE: Specify it explicitly so you know what to configure in firewalls.
      #
      # We set 30000 because in our kind-cluster-config.yaml we mapped:
      #   containerPort: 30000 → hostPort: 30000
      # This means localhost:30000 → kind node:30000 → pod:80
      nodePort: 30000

# ─── HOW TRAFFIC FLOWS WITH NODEPORT ─────────────────────────────────────────
# Your machine → kind control-plane container:30000 → iptables → Pod:80
#
# Step by step:
# 1. You open http://localhost:30000 in your browser
# 2. Docker Desktop forwards :30000 to the kind control-plane container
#    (because we set hostPort: 30000 in kind-cluster-config.yaml)
# 3. The node's iptables rules (set by kube-proxy) intercept traffic on :30000
# 4. kube-proxy DNAT's the packet to one of the pods (10.100.x.x:80)
# 5. The packet is routed to the pod's nginx process
#
# VERIFY AFTER APPLYING:
#   kubectl apply -f 05-services/nodeport-service.yaml
#   curl http://localhost:30000
#   → You should see the nginx default page!
