# =============================================================================
# FILE:    clusterip-service.yaml
# KIND:    Service
# PURPOSE: Expose the gateway Deployment on a stable internal ClusterIP so
#          workloads inside the cluster can reach it by DNS name instead of by
#          changing pod IPs.
# WHEN:    setup/05-services - after the gateway Deployment exists.
# ENTERPRISE EQUIVALENT: The same ClusterIP Service pattern is used on AWS EKS,
#                        Google GKE, and Azure AKS. Even when traffic arrives
#                        through an ALB, GCLB, or Application Gateway, the
#                        backend often still sits behind a ClusterIP Service.
# =============================================================================

apiVersion: v1
kind: Service

metadata:
  # CONFIGURATION EXPLANATION `inference-gateway-clusterip` is the Kubernetes API name for this Service. Humans
  # and automation use this name in kubectl commands, audit logs, and incident
  # runbooks, so changing it must be deliberate and coordinated with scripts that
  # reference it.
  name: inference-gateway-clusterip
  # CONFIGURATION EXPLANATION `applications` is the namespace where this object is stored. A namespace is a
  # named boundary inside one cluster for permissions, quotas, network rules, and
  # cleanup; putting this object in the wrong namespace makes selectors and scripts
  # miss it.
  namespace: applications
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/component: internal-service
    app.kubernetes.io/part-of: platform-networking-lab
  annotations:
    description: "Stable internal endpoint for the inference-gateway Deployment"

spec:
  # ClusterIP is the default Service type.
  # It gives the gateway a stable virtual IP and DNS identity inside the cluster.
  # CONFIGURATION EXPLANATION ClusterIP keeps the Service reachable only inside the cluster. That is the normal
  # production choice for backend APIs because it reduces exposure: other pods can
  # call the service, but the internet cannot reach it directly.
  type: ClusterIP

  # The selector chooses gateway pods, not the Deployment object itself.
  # Services route to ready pod endpoints that match these labels.
  selector:
    # CONFIGURATION EXPLANATION `app: inference-gateway` is a label used as a matching contract. Deployment
    # selectors, pod template labels, and Service selectors must agree on this value,
    # or Kubernetes will create objects that cannot find the pods they are supposed to
    # manage or route to.
    app: inference-gateway
    tier: backend

  ports:
    - name: http
      protocol: TCP

      # Clients inside the cluster connect to port 80 on the Service.
      # CONFIGURATION EXPLANATION `80` is the Service port clients use. A Service gives callers a stable address
      # even when pods are replaced, so this value becomes part of the internal API
      # contract between workloads.
      port: 80

      # The gateway container actually listens on port 8080.
      # Using the named port keeps the Service readable and resilient to pod-level port renames.
      # CONFIGURATION EXPLANATION `http` sends Service traffic to a container port or named port on matching
      # pods. This is the bridge between stable Service networking and the actual
      # application process inside each pod.
      targetPort: http

  sessionAffinity: None

# =============================================================================
# KEY LEARNING NOTE
#
# This Service exposes the gateway.
# A DIFFERENT Service will expose the sibling backend Deployment.
# The gateway will call that sibling backend by its Service DNS name, not by
# the Deployment name and not by raw pod IP.
# =============================================================================
