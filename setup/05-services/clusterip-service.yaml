# =============================================================================
# FILE:    clusterip-service.yaml
# KIND:    Service
# PURPOSE: Expose the gateway Deployment on a stable internal ClusterIP so
#          workloads inside the cluster can reach it by DNS name instead of by
#          changing pod IPs.
# WHEN:    setup/05-services - after the gateway Deployment exists.
# ENTERPRISE EQUIVALENT: The same ClusterIP Service pattern is used on AWS EKS,
#                        Google GKE, and Azure AKS. Even when traffic arrives
#                        through an ALB, GCLB, or Application Gateway, the
#                        backend often still sits behind a ClusterIP Service.
# =============================================================================

apiVersion: v1
kind: Service

metadata:
  name: inference-gateway-clusterip
  namespace: applications
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/component: internal-service
    app.kubernetes.io/part-of: platform-networking-lab
  annotations:
    description: "Stable internal endpoint for the inference-gateway Deployment"

spec:
  # ClusterIP is the default Service type.
  # It gives the gateway a stable virtual IP and DNS identity inside the cluster.
  type: ClusterIP

  # The selector chooses gateway pods, not the Deployment object itself.
  # Services route to ready pod endpoints that match these labels.
  selector:
    app: inference-gateway
    tier: backend

  ports:
    - name: http
      protocol: TCP

      # Clients inside the cluster connect to port 80 on the Service.
      port: 80

      # The gateway container actually listens on port 8080.
      # Using the named port keeps the Service readable and resilient to pod-level port renames.
      targetPort: http

  sessionAffinity: None

# =============================================================================
# KEY LEARNING NOTE
#
# This Service exposes the gateway.
# A DIFFERENT Service will expose the sibling backend Deployment.
# The gateway will call that sibling backend by its Service DNS name, not by
# the Deployment name and not by raw pod IP.
# =============================================================================
