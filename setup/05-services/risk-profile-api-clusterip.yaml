# =============================================================================
# FILE:    risk-profile-api-clusterip.yaml
# KIND:    Service
# PURPOSE: Expose the sibling backend Deployment with a stable DNS name so the
#          gateway Deployment can call it reliably across pod restarts, reschedules,
#          and rolling updates.
# WHEN:    setup/05-services - after risk-profile-api-deployment exists.
# ENTERPRISE EQUIVALENT: This is the common east-west service discovery pattern
#                        for internal APIs on EKS, GKE, and AKS. The caller talks
#                        to stable service DNS while kube-proxy and endpoints
#                        track whichever backend pods are currently healthy.
# =============================================================================

apiVersion: v1
kind: Service

metadata:
  # CONFIGURATION EXPLANATION `risk-profile-api-clusterip` is the Kubernetes API name for this Service. Humans
  # and automation use this name in kubectl commands, audit logs, and incident
  # runbooks, so changing it must be deliberate and coordinated with scripts that
  # reference it.
  name: risk-profile-api-clusterip
  # CONFIGURATION EXPLANATION `applications` is the namespace where this object is stored. A namespace is a
  # named boundary inside one cluster for permissions, quotas, network rules, and
  # cleanup; putting this object in the wrong namespace makes selectors and scripts
  # miss it.
  namespace: applications
  labels:
    app.kubernetes.io/name: risk-profile-api
    app.kubernetes.io/component: internal-service
    app.kubernetes.io/part-of: platform-networking-lab
  annotations:
    description: "Stable internal endpoint for the risk-profile-api Deployment"

spec:
  # This backend is internal only.
  # The gateway calls it through cluster DNS, so ClusterIP is exactly the right type.
  # CONFIGURATION EXPLANATION ClusterIP keeps the Service reachable only inside the cluster. That is the normal
  # production choice for backend APIs because it reduces exposure: other pods can
  # call the service, but the internet cannot reach it directly.
  type: ClusterIP

  selector:
    # CONFIGURATION EXPLANATION `app: risk-profile-api` is a label used as a matching contract. Deployment
    # selectors, pod template labels, and Service selectors must agree on this value,
    # or Kubernetes will create objects that cannot find the pods they are supposed to
    # manage or route to.
    app: risk-profile-api
    tier: backend

  ports:
    - name: http
      protocol: TCP

      # Backend clients connect to Service port 80.
      # CONFIGURATION EXPLANATION `80` is the Service port clients use. A Service gives callers a stable address
      # even when pods are replaced, so this value becomes part of the internal API
      # contract between workloads.
      port: 80

      # The actual backend container listens on 8081.
      # CONFIGURATION EXPLANATION `http` sends Service traffic to a container port or named port on matching
      # pods. This is the bridge between stable Service networking and the actual
      # application process inside each pod.
      targetPort: http

  sessionAffinity: None

# =============================================================================
# WHAT THIS ENABLES
#
# gateway pod
#   -> http://risk-profile-api-clusterip/profile/rules
#   -> Service endpoint list
#   -> whichever backend pod is Ready
#
# This is the answer to:
#   "How do multiple Deployments talk to each other reliably in Kubernetes?"
# =============================================================================
