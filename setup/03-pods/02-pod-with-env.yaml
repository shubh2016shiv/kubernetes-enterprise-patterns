# =============================================================================
# FILE: 03-pods/02-pod-with-env.yaml
# PURPOSE: Pod demonstrating enterprise configuration patterns:
#          env vars + Downward API + resource-aware runtime settings.
# =============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: inference-worker-config-demo
  namespace: applications
  labels:
    app.kubernetes.io/name: inference-worker-config-demo
    app.kubernetes.io/component: inference-worker
    app.kubernetes.io/part-of: ml-platform
    app: inference-worker
    version: "1.0.0"
spec:
  containers:
    - name: worker
      image: python:3.11.11-slim
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
        - |
          echo "Starting inference-worker-config-demo"
          echo "POD_NAME=${POD_NAME}"
          echo "POD_NAMESPACE=${POD_NAMESPACE}"
          echo "NODE_NAME=${NODE_NAME}"
          echo "APP_ENVIRONMENT=${APP_ENVIRONMENT}"
          python - <<'PY'
          import time
          while True:
              print("worker heartbeat")
              time.sleep(30)
          PY
      env:
        - name: APP_ENVIRONMENT
          value: "development"
        - name: APP_LOG_LEVEL
          value: "info"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: MEMORY_LIMIT_BYTES
          valueFrom:
            resourceFieldRef:
              containerName: worker
              resource: limits.memory
              divisor: "1"
        - name: CPU_REQUEST_MILLICORES
          valueFrom:
            resourceFieldRef:
              containerName: worker
              resource: requests.cpu
              divisor: "1m"
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "300m"
          memory: "256Mi"
