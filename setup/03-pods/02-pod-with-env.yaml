# =============================================================================
# FILE: 03-pods/02-pod-with-env.yaml
# PURPOSE: Pod demonstrating enterprise configuration patterns:
#          env vars + Downward API + resource-aware runtime settings.
# =============================================================================

apiVersion: v1
kind: Pod
metadata:
  # CONFIGURATION EXPLANATION `inference-worker-config-demo` is the Kubernetes API name for this Pod. Humans and
  # automation use this name in kubectl commands, audit logs, and incident runbooks,
  # so changing it must be deliberate and coordinated with scripts that reference it.
  name: inference-worker-config-demo
  # CONFIGURATION EXPLANATION `applications` is the namespace where this object is stored. A namespace is a
  # named boundary inside one cluster for permissions, quotas, network rules, and
  # cleanup; putting this object in the wrong namespace makes selectors and scripts
  # miss it.
  namespace: applications
  labels:
    app.kubernetes.io/name: inference-worker-config-demo
    app.kubernetes.io/component: inference-worker
    app.kubernetes.io/part-of: ml-platform
    # CONFIGURATION EXPLANATION `app: inference-worker` is a label used as a matching contract. Deployment
    # selectors, pod template labels, and Service selectors must agree on this value,
    # or Kubernetes will create objects that cannot find the pods they are supposed to
    # manage or route to.
    app: inference-worker
    version: "1.0.0"
spec:
  containers:
    - name: worker
      # CONFIGURATION EXPLANATION `python:3.11.11-slim` is the container image that will run in the pod. The tag
      # is part of the release decision: production teams avoid unpinned `latest`
      # images so rollbacks, audits, and vulnerability scans know exactly which
      # artifact was deployed.
      image: python:3.11.11-slim
      # CONFIGURATION EXPLANATION `IfNotPresent` tells kubelet when to pull the image from a registry. In this
      # lab it avoids unnecessary downloads; in production the pull policy is chosen
      # together with immutable image tags so deployments are both repeatable and
      # fresh when intended.
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
        - |
          echo "Starting inference-worker-config-demo"
          echo "POD_NAME=${POD_NAME}"
          echo "POD_NAMESPACE=${POD_NAMESPACE}"
          echo "NODE_NAME=${NODE_NAME}"
          echo "APP_ENVIRONMENT=${APP_ENVIRONMENT}"
          python - <<'PY'
          import time
          while True:
              print("worker heartbeat")
              time.sleep(30)
          PY
      env:
        - name: APP_ENVIRONMENT
          value: "development"
        - name: APP_LOG_LEVEL
          value: "info"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: MEMORY_LIMIT_BYTES
          valueFrom:
            resourceFieldRef:
              containerName: worker
              resource: limits.memory
              divisor: "1"
        - name: CPU_REQUEST_MILLICORES
          valueFrom:
            resourceFieldRef:
              containerName: worker
              resource: requests.cpu
              divisor: "1m"
      # CONFIGURATION EXPLANATION `resources` lists the object types this permission applies to, such as pods,
      # services, or secrets. Least privilege means naming only the resources the
      # workload actually needs, not granting access to everything.
      resources:
        # CONFIGURATION EXPLANATION Resource requests are the minimum CPU and memory the scheduler reserves for
        # this container. They affect which node the pod can land on and form the
        # baseline used by autoscaling, capacity planning, and cost forecasting.
        requests:
          # CONFIGURATION EXPLANATION `100m` is a CPU amount; `100m` means one tenth of one CPU core. Requests
          # reserve scheduling capacity, while limits cap usage, so the same-looking
          # field can mean either baseline capacity or a hard ceiling depending on its
          # parent section.
          cpu: "100m"
          # CONFIGURATION EXPLANATION `128Mi` is a memory amount. Memory is not compressible like CPU: if a
          # container exceeds its memory limit, Kubernetes may kill it, so production
          # teams set this from observed usage plus headroom.
          memory: "128Mi"
        # CONFIGURATION EXPLANATION Resource limits are the maximum CPU and memory this container is allowed to
        # use. They protect the node and neighboring pods from one workload consuming
        # everything, which is a core multi-tenant production safety rule.
        limits:
          # CONFIGURATION EXPLANATION `300m` is a CPU amount; `100m` means one tenth of one CPU core. Requests
          # reserve scheduling capacity, while limits cap usage, so the same-looking
          # field can mean either baseline capacity or a hard ceiling depending on its
          # parent section.
          cpu: "300m"
          # CONFIGURATION EXPLANATION `256Mi` is a memory amount. Memory is not compressible like CPU: if a
          # container exceeds its memory limit, Kubernetes may kill it, so production
          # teams set this from observed usage plus headroom.
          memory: "256Mi"
