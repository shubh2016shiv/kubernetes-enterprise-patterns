# =============================================================================
# FILE: 03-pods/03-multi-container-pod.yaml
# PURPOSE: Enterprise sidecar pattern:
#          app container writes logs to shared volume, sidecar ships/streams logs.
# =============================================================================

apiVersion: v1
kind: Pod
metadata:
  name: inference-with-log-sidecar
  namespace: applications
  labels:
    app.kubernetes.io/name: inference-with-log-sidecar
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: ml-platform
    app: inference-demo
    pattern: sidecar
spec:
  initContainers:
    - name: init-config
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - |
          echo "INIT_DONE=true" > /config/runtime.env
          echo "startup_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> /config/runtime.env
      volumeMounts:
        - name: shared-config
          mountPath: /config

  containers:
    - name: inference-app
      image: python:3.11.11-slim
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
        - |
          mkdir -p /var/log/inference
          python - <<'PY'
          from http.server import BaseHTTPRequestHandler, HTTPServer
          import json, time

          LOG_PATH = "/var/log/inference/access.log"

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  entry = {
                      "ts": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                      "path": self.path,
                      "method": "GET",
                      "client": self.client_address[0],
                  }
                  with open(LOG_PATH, "a", encoding="utf-8") as f:
                      f.write(json.dumps(entry) + "\n")
                  if self.path == "/health":
                      body = b'{"status":"ok"}'
                      self.send_response(200)
                  else:
                      body = b'{"service":"inference-demo","endpoint":"use /health"}'
                      self.send_response(200)
                  self.send_header("Content-Type", "application/json")
                  self.end_headers()
                  self.wfile.write(body)

          HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          PY
      ports:
        - name: http
          containerPort: 8080
      resources:
        requests:
          cpu: "150m"
          memory: "192Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      volumeMounts:
        - name: log-volume
          mountPath: /var/log/inference
        - name: shared-config
          mountPath: /config
          readOnly: true

    - name: log-shipper
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - |
          echo "log sidecar online"
          until [ -f /var/log/inference/access.log ]; do
            echo "waiting for app log file..."
            sleep 2
          done
          tail -F /var/log/inference/access.log | while read line; do
            echo "[inference-log] ${line}"
          done
      resources:
        requests:
          cpu: "20m"
          memory: "32Mi"
        limits:
          cpu: "100m"
          memory: "96Mi"
      volumeMounts:
        - name: log-volume
          mountPath: /var/log/inference
          readOnly: true

  volumes:
    - name: log-volume
      emptyDir:
        sizeLimit: 100Mi
    - name: shared-config
      emptyDir:
        sizeLimit: 10Mi

  restartPolicy: Always
  terminationGracePeriodSeconds: 30
