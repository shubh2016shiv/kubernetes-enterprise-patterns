# =============================================================================
# FILE:    deployment-with-limits.yaml
# KIND:    Deployment
# PURPOSE: Deploy a compliant workload that declares explicit CPU and memory
#          requests/limits and fits inside the namespace resource policies.
# WHEN:    setup/08-resource-management - after applying ResourceQuota and
#          LimitRange.
# ENTERPRISE EQUIVALENT: Production Deployments on EKS, GKE, and AKS should set
#                        resource requests and limits based on load testing,
#                        monitoring data, and SLO requirements.
# =============================================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  # CONFIGURATION EXPLANATION `resource-managed-gateway` is the Kubernetes API name for this Deployment. Humans
  # and automation use this name in kubectl commands, audit logs, and incident
  # runbooks, so changing it must be deliberate and coordinated with scripts that
  # reference it.
  name: resource-managed-gateway
  # CONFIGURATION EXPLANATION `applications` is the namespace where this object is stored. A namespace is a
  # named boundary inside one cluster for permissions, quotas, network rules, and
  # cleanup; putting this object in the wrong namespace makes selectors and scripts
  # miss it.
  namespace: applications
  labels:
    # CONFIGURATION EXPLANATION `app: resource-managed-gateway` is a label used as a matching contract.
    # Deployment selectors, pod template labels, and Service selectors must agree on
    # this value, or Kubernetes will create objects that cannot find the pods they are
    # supposed to manage or route to.
    app: resource-managed-gateway
    tier: frontend
    app.kubernetes.io/name: resource-managed-gateway
    app.kubernetes.io/component: resource-management-demo
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Compliant Deployment used to inspect requests, limits, and quota usage."

spec:
  # CONFIGURATION EXPLANATION `2` replicas means Kubernetes should keep that many pod copies running. More than
  # one copy teaches availability and rolling updates: one pod can be replaced or fail
  # while another continues serving traffic.
  replicas: 2

  selector:
    matchLabels:
      app: resource-managed-gateway

  template:
    metadata:
      labels:
        app: resource-managed-gateway
        tier: frontend

    spec:
      containers:
        - name: gateway
          # CONFIGURATION EXPLANATION `nginx:1.25.4` is the container image that will run in the pod. The tag is
          # part of the release decision: production teams avoid unpinned `latest`
          # images so rollbacks, audits, and vulnerability scans know exactly which
          # artifact was deployed.
          image: nginx:1.25.4
          # CONFIGURATION EXPLANATION `IfNotPresent` tells kubelet when to pull the image from a registry. In
          # this lab it avoids unnecessary downloads; in production the pull policy is
          # chosen together with immutable image tags so deployments are both
          # repeatable and fresh when intended.
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              # CONFIGURATION EXPLANATION `80` is the port the process inside the container listens on. A
              # Service targetPort or probe must point here; if the numbers do not
              # line up, the pod can be running while traffic still fails.
              containerPort: 80

          # CONFIGURATION EXPLANATION `resources` lists the object types this permission applies to, such as
          # pods, services, or secrets. Least privilege means naming only the
          # resources the workload actually needs, not granting access to everything.
          resources:
            # CONFIGURATION EXPLANATION Resource requests are the minimum CPU and memory the scheduler reserves
            # for this container. They affect which node the pod can land on and form
            # the baseline used by autoscaling, capacity planning, and cost
            # forecasting.
            requests:
              # Request 100m CPU per replica. With 2 replicas, this Deployment
              # consumes 200m of the namespace's 2 CPU request budget.
              # CONFIGURATION EXPLANATION `100m` is a CPU amount; `100m` means one tenth of one CPU core.
              # Requests reserve scheduling capacity, while limits cap usage, so the
              # same-looking field can mean either baseline capacity or a hard ceiling
              # depending on its parent section.
              cpu: "100m"
              # Request 128Mi per replica. With 2 replicas, this consumes 256Mi
              # of the namespace's 2Gi memory request budget.
              # CONFIGURATION EXPLANATION `128Mi` is a memory amount. Memory is not compressible like CPU: if a
              # container exceeds its memory limit, Kubernetes may kill it, so
              # production teams set this from observed usage plus headroom.
              memory: "128Mi"
            # CONFIGURATION EXPLANATION Resource limits are the maximum CPU and memory this container is allowed
            # to use. They protect the node and neighboring pods from one workload
            # consuming everything, which is a core multi-tenant production safety
            # rule.
            limits:
              # CPU limits cap burst behavior. Exceeding CPU limit throttles the
              # container instead of killing it.
              # CONFIGURATION EXPLANATION `250m` is a CPU amount; `100m` means one tenth of one CPU core.
              # Requests reserve scheduling capacity, while limits cap usage, so the
              # same-looking field can mean either baseline capacity or a hard ceiling
              # depending on its parent section.
              cpu: "250m"
              # Memory limits are strict. Exceeding this can OOMKill the container.
              # CONFIGURATION EXPLANATION `256Mi` is a memory amount. Memory is not compressible like CPU: if a
              # container exceeds its memory limit, Kubernetes may kill it, so
              # production teams set this from observed usage plus headroom.
              memory: "256Mi"

# =============================================================================
# WHAT THIS WORKLOAD TEACHES
#
# This Deployment is intentionally small so it can run alongside earlier modules
# on the learner's 16 GB laptop. The point is not to benchmark nginx. The point
# is to see how requests and limits show up in quota usage and pod descriptions.
# =============================================================================
