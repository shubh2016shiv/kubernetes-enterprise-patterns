# =============================================================================
# FILE:    resource-quota.yaml
# KIND:    ResourceQuota
# PURPOSE: Set a hard namespace budget for compute, storage claims, and object
#          counts so one tenant cannot consume the whole learning cluster.
# WHEN:    setup/08-resource-management - after RBAC has introduced access
#          control for who may operate in the namespace.
# ENTERPRISE EQUIVALENT: Platform teams set namespace quotas on EKS, GKE, and
#                        AKS to control capacity, blast radius, and cloud cost.
# =============================================================================

apiVersion: v1
kind: ResourceQuota

metadata:
  # CONFIGURATION EXPLANATION `applications-quota` is the Kubernetes API name for this ResourceQuota. Humans and
  # automation use this name in kubectl commands, audit logs, and incident runbooks,
  # so changing it must be deliberate and coordinated with scripts that reference it.
  name: applications-quota
  # CONFIGURATION EXPLANATION `applications` is the namespace where this object is stored. A namespace is a
  # named boundary inside one cluster for permissions, quotas, network rules, and
  # cleanup; putting this object in the wrong namespace makes selectors and scripts
  # miss it.
  namespace: applications
  labels:
    app.kubernetes.io/name: applications
    app.kubernetes.io/component: resource-quota
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Small tenant budget for the applications namespace in kind."

spec:
  hard:
    # These values are intentionally conservative for a Windows 11 laptop with
    # 16 GB RAM and Docker Desktop limited to roughly 8 GB. The goal is to teach
    # the policy behavior without starving the local kind cluster.
    requests.cpu: "2"
    requests.memory: "2Gi"
    limits.cpu: "4"
    limits.memory: "4Gi"

    # Object quotas protect kube-apiserver and etcd from accidental floods of
    # small objects. This matters in enterprise just as much as CPU and memory.
    pods: "20"
    services: "10"
    services.nodeports: "2"
    services.loadbalancers: "1"
    configmaps: "30"
    secrets: "30"
    persistentvolumeclaims: "5"

    # Count quotas use resource-qualified names for non-core API resources.
    # They are useful when teams create too many controllers or leave old
    # ReplicaSets behind after frequent rollouts.
    count/deployments.apps: "10"
    count/replicasets.apps: "30"

# =============================================================================
# WHAT THIS PROTECTS
#
# RBAC may allow a team to create Deployments, but ResourceQuota decides whether
# the namespace has enough remaining budget for that Deployment. This separation
# is central to enterprise platform engineering:
#
#   Authorization: "Are you allowed to deploy?"
#   Quota:         "Does your deployment fit the tenant budget?"
# =============================================================================
