# =============================================================================
# FILE: 04-deployments/nginx-deployment.yaml
# PURPOSE: Production-style Deployment — how ALL applications run in real
#          Kubernetes environments. Never deploy bare Pods in production.
#
# WHAT IS A DEPLOYMENT?
#   A Deployment is a K8s controller that manages a set of identical Pods.
#   It creates a layer called ReplicaSet to track desired vs actual state.
#
# THE CONTROLLER HIERARCHY (critical for interviews):
#
#   Deployment
#       └── ReplicaSet (version-specific, immutable)
#               └── Pod 1
#               └── Pod 2
#               └── Pod 3
#
#   Deployment → manages HISTORY and ROLLOUT STRATEGY
#   ReplicaSet → manages POD COUNT (reconciles actual vs desired replicas)
#   Pod        → runs your actual application code
#
# WHAT DEPLOYMENT GIVES YOU (vs bare Pods):
#   ✓ Self-healing: If a Pod dies, ReplicaSet creates a new one immediately
#   ✓ Scaling: kubectl scale → add/remove replicas in seconds
#   ✓ Rolling updates: Update image version with zero downtime
#   ✓ Rollback: kubectl rollout undo → revert to previous version instantly
#   ✓ Revision history: see every deployment event with kubectl rollout history
#
# RECONCILIATION LOOP (the heart of Kubernetes):
#   Every ~15 seconds, the ReplicaSet controller checks:
#   "How many pods with my labels are running? Is it == desired replicas?"
#   If actual < desired → create new pods
#   If actual > desired → delete excess pods
#   This is the "desired state" model — K8s ALWAYS tries to match reality to your YAML.
# =============================================================================

apiVersion: apps/v1   # Deployment is in the "apps" API group, not core "v1"
kind: Deployment

metadata:
  name: nginx-deployment
  namespace: applications

  labels:
    # Labels ON the Deployment itself (different from labels on the Pods it creates)
    app.kubernetes.io/name: nginx
    app.kubernetes.io/version: "1.25.4"
    app.kubernetes.io/component: web-server
    app.kubernetes.io/part-of: learning-cluster
    managed-by: kubectl

  # Annotations: tool-specific metadata, CI/CD traceability
  annotations:
    # In enterprise: these would be set by your CI/CD pipeline automatically
    deployment.kubernetes.io/revision: "1"
    # Link to the Git commit that triggered this deployment (GitOps pattern)
    # git-sha: "abc1234def5678"
    # change-reason: "Updated nginx from 1.25.3 to 1.25.4 for security patches"
    # deployed-by: "github-actions/deploy-prod.yml"
    description: "NGINX web server deployment for learning K8s deployments"

spec:
  # ── REPLICA COUNT ───────────────────────────────────────────────────────────
  # replicas: How many identical Pod instances you want running.
  # The ReplicaSet controller enforces this count continuously.
  #
  # ENTERPRISE SIZING RULES:
  #   - Minimum 2 replicas in production (single replica = single point of failure)
  #   - Minimum 3 replicas for truly HA services
  #   - Odd numbers are NOT required for stateless apps (only for stateful quorums like etcd)
  #   - Consider: if one node goes down, do you still have enough replicas?
  #   - For 3-node cluster: use 3+ replicas so each node has ≥1 pod (if anti-affinity set)
  replicas: 3

  # ── SELECTOR ───────────────────────────────────────────────────────────────
  # selector: Tells the Deployment/ReplicaSet WHICH pods to manage.
  # The selector must MATCH the labels in the pod template below.
  # This is a required field and CANNOT be changed after creation.
  #
  # HOW MATCHING WORKS:
  #   Deployment → looks for pods with these labels
  #   If found → manages them (counts them, replaces if deleted)
  #   If none found → creates new pods based on the template
  #
  # DANGER: If you accidentally match another deployment's pods,
  # they'll "adopt" each other's pods → chaos. Always use unique labels.
  selector:
    matchLabels:
      app: nginx          # Must exist in spec.template.metadata.labels below
      tier: frontend      # Additional selector for specificity

  # ── ROLLOUT STRATEGY ────────────────────────────────────────────────────────
  # strategy: How to transition from old version to new version.
  #
  # TWO STRATEGIES:
  #
  #   RollingUpdate (default): Replace pods incrementally
  #     - maxUnavailable: max pods DOWN at any time during update
  #     - maxSurge: max pods ABOVE replica count during update
  #     - Old pods and new pods coexist briefly → must handle mixed versions
  #     - Result: Zero downtime, gradual traffic shift
  #     - Enterprise use: default for stateless services
  #
  #   Recreate: Kill ALL old pods, THEN create new pods
  #     - Results in downtime (gap between old death and new startup)
  #     - Use ONLY when old and new versions CANNOT coexist
  #     - Example: breaking database schema migration that old code can't handle
  #
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # maxUnavailable: During update, how many pods can be unavailable?
      # "1" means at most 1 pod is down at any time (replicas - 1 = 2 always serving)
      # Can be absolute (1) or percentage (25%) of total replicas
      maxUnavailable: 1

      # maxSurge: During update, how many EXTRA pods above replicas can exist?
      # "1" means K8s creates 1 new pod before deleting an old one
      # This ensures no capacity loss during the transition
      # Total pods during rollout: replicas + maxSurge = 3 + 1 = 4 pods max
      maxSurge: 1

  # ── POD TEMPLATE ────────────────────────────────────────────────────────────
  # template: The blueprint for each Pod the Deployment creates.
  # This is identical to a Pod spec, wrapped in a template section.
  # Every pod created by this Deployment is a clone of this template.
  template:
    metadata:
      # Labels on the PODS (not on the Deployment itself)
      # These MUST include all labels referenced in spec.selector.matchLabels
      labels:
        app: nginx             # ← Must match selector.matchLabels.app
        tier: frontend         # ← Must match selector.matchLabels.tier
        app.kubernetes.io/name: nginx
        app.kubernetes.io/version: "1.25.4"
        # This label is added by the ReplicaSet (not here, for learning purposes)
        # pod-template-hash: "abcdef123"  ← K8s adds this automatically

    spec:
      # ── SCHEDULING CONTROL ─────────────────────────────────────────────────

      # topologySpreadConstraints: Spread pods across nodes/zones for HA.
      # ENTERPRISE CRITICAL: Without this, K8s might put all 3 replicas on one node.
      # If that node fails → all 3 pods are gone → outage despite having 3 replicas.
      #
      # This constraint says: "the difference in pod count between any two zones
      # must not exceed 1" → Kubernetes spreads pods evenly across zones.
      topologySpreadConstraints:
        - maxSkew: 1           # Max allowed difference in pod count between any 2 zones
          topologyKey: "topology.kubernetes.io/zone"  # Which label defines "zones"
          whenUnsatisfiable: DoNotSchedule  # If constraint can't be met, block scheduling
          #                                   (ScheduleAnyway = softer constraint)
          labelSelector:
            matchLabels:
              app: nginx       # Apply this constraint to pods with this label

      # ── CONTAINERS ────────────────────────────────────────────────────────
      containers:
        - name: nginx
          image: nginx:1.25.4
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 80

          # ── ENVIRONMENT VARIABLES ─────────────────────────────────────────
          env:
            - name: NGINX_VERSION
              value: "1.25.4"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          # ── RESOURCE MANAGEMENT ───────────────────────────────────────────
          # These values are the most important thing to get right in enterprise.
          # Wrong values → either resource waste or OOMKilled pods.
          resources:
            requests:
              cpu: "100m"      # 100 millicores = 10% of 1 CPU core
              memory: "128Mi"  # 128 Mebibytes
            limits:
              cpu: "500m"      # 500 millicores = 50% of 1 CPU core
              memory: "256Mi"  # 256 Mebibytes

          # ── LIVENESS PROBE ────────────────────────────────────────────────
          # "Is this container still alive? Or is it in a broken state?"
          # If liveness fails → container is KILLED and RESTARTED
          # Use for: detecting deadlocks, infinite loops, corrupted in-memory state
          #
          # THREE PROBE TYPES:
          #   httpGet    → HTTP request to the container
          #   tcpSocket  → TCP connection to a port
          #   exec       → Run a command inside the container
          livenessProbe:
            httpGet:
              path: /              # nginx serves a 200 OK at "/"
              port: 80
              # For HTTPS: scheme: HTTPS (rare in internal cluster communication)
            # initialDelaySeconds: Wait before first probe (let app warm up)
            # Too low → pod killed before app finishes starting → CrashLoopBackOff
            # Too high → broken container keeps running too long before restart
            initialDelaySeconds: 15
            # periodSeconds: How often to probe
            periodSeconds: 20
            # failureThreshold: Failures in a row before declaring "Dead"
            failureThreshold: 3
            # timeoutSeconds: How long to wait for probe response
            timeoutSeconds: 5

          # ── READINESS PROBE ───────────────────────────────────────────────
          # "Is this container ready to accept traffic?"
          # If readiness fails → container is REMOVED from Service endpoints
          #   (traffic stops going to it, but container is NOT restarted)
          # Use for: app startup time, temporary inability to serve (cache warming,
          #          circuit breaker open, dependencies temporarily unavailable)
          #
          # DIFFERENCE FROM LIVENESS:
          #   Liveness fail → RESTART the container
          #   Readiness fail → STOP TRAFFIC to the container (don't restart)
          readinessProbe:
            httpGet:
              path: /
              port: 80
            # Shorter initial delay than liveness — check readiness sooner
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            # successThreshold: How many SUCCESSES in a row after failure
            # to be considered Ready again (default 1 is usually fine)
            successThreshold: 1

          # ── LIFECYCLE HOOKS ───────────────────────────────────────────────
          # Hooks that run at specific container lifecycle events.
          # postStart: runs IMMEDIATELY after container starts (before probe checks)
          # preStop: runs BEFORE container receives SIGTERM
          #
          # preStop is CRITICAL for graceful shutdown in enterprise:
          # When K8s removes a pod from Service endpoints AND sends SIGTERM simultaneously,
          # there's a brief race condition — some requests might still reach the dying pod.
          # Adding a sleep in preStop gives time for the load balancer to update,
          # ensuring no requests reach the pod during shutdown.
          lifecycle:
            preStop:
              exec:
                # Sleep 5s before nginx gets SIGTERM
                # This gives kube-proxy time to update iptables rules and
                # stop routing new traffic to this pod
                command: ["/bin/sh", "-c", "sleep 5; nginx -s quit"]

      # ── POD-LEVEL SETTINGS ────────────────────────────────────────────────

      # terminationGracePeriodSeconds:
      # Total time K8s waits for graceful shutdown.
      # Must be LONGER than your preStop hook + app shutdown time combined.
      # 30 (default) → preStop(5s) + nginx quit(~2s) = 7s total, well within limit.
      terminationGracePeriodSeconds: 30

      # dnsPolicy: How containers in this pod resolve DNS names.
      #   ClusterFirst (default): Internal K8s names go to CoreDNS,
      #                           external names go to upstream DNS
      #   ClusterFirstWithHostNet: Same but when using host networking
      #   Default: Use the node's /etc/resolv.conf directly (bypasses CoreDNS)
      #   None: Completely custom DNS (specify dnsConfig below)
      dnsPolicy: ClusterFirst

# =============================================================================
# AFTER APPLYING THIS DEPLOYMENT:
#
# kubectl get deployments -n applications
#   NAME               READY   UP-TO-DATE   AVAILABLE   AGE
#   nginx-deployment   3/3     3            3           30s
#   ↑ name             ↑ready/desired ↑ updated ↑ available now
#
# kubectl get replicasets -n applications
#   NAME                          DESIRED   CURRENT   READY   AGE
#   nginx-deployment-7d8b9cf7f5   3         3         3       30s
#   ↑ {deployment-name}-{pod-template-hash}
#
# kubectl get pods -n applications
#   NAME                              READY   STATUS    RESTARTS   AGE
#   nginx-deployment-7d8b9cf7f5-abc   1/1     Running   0          30s
#   nginx-deployment-7d8b9cf7f5-def   1/1     Running   0          30s
#   nginx-deployment-7d8b9cf7f5-ghi   1/1     Running   0          30s
#   ↑ {replicaset-name}-{random-5-chars}
# =============================================================================
