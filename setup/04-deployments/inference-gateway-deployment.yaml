# =============================================================================
# FILE:    inference-gateway-deployment.yaml
# KIND:    Deployment
# PURPOSE: Teaches the standard Kubernetes controller for a stateless edge
#          service. This gateway represents the "front door" Deployment that
#          later receives traffic through a Service and calls a sibling backend.
# WHEN:    setup/04-deployments - after the learner understands raw Pods.
# ENTERPRISE EQUIVALENT: This same pattern is used for API gateways, internal
#                        stateless APIs, and web backends on AWS EKS, Google
#                        GKE, and Azure AKS. In production, the image usually
#                        comes from an internal OCI registry and a GitOps tool
#                        applies the rollout instead of a human typing kubectl.
# =============================================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  # CONFIGURATION EXPLANATION `inference-gateway-deployment` is the Kubernetes API name for this Deployment.
  # Humans and automation use this name in kubectl commands, audit logs, and incident
  # runbooks, so changing it must be deliberate and coordinated with scripts that
  # reference it.
  name: inference-gateway-deployment
  # CONFIGURATION EXPLANATION `applications` is the namespace where this object is stored. A namespace is a
  # named boundary inside one cluster for permissions, quotas, network rules, and
  # cleanup; putting this object in the wrong namespace makes selectors and scripts
  # miss it.
  namespace: applications
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: edge-gateway
    app.kubernetes.io/part-of: platform-networking-lab
    # CONFIGURATION EXPLANATION `app: inference-gateway` is a label used as a matching contract. Deployment
    # selectors, pod template labels, and Service selectors must agree on this value,
    # or Kubernetes will create objects that cannot find the pods they are supposed to
    # manage or route to.
    app: inference-gateway
    tier: backend
  annotations:
    description: "Front-door Deployment used to teach rollout, rollback, scaling, and multi-Deployment thinking"

spec:
  # Three replicas is a common starting point for a stateless traffic-serving API.
  # Why not one?
  #   One replica means every restart becomes downtime.
  # Why not two?
  #   Two is better, but three makes availability and rolling updates easier to reason about.
  # LOCAL:
  #   Three lightweight replicas still fit on the 16 GB learner machine.
  # ENTERPRISE:
  #   A production gateway often starts at 3+ replicas and then scales with HPA.
  # CONFIGURATION EXPLANATION `3` replicas means Kubernetes should keep that many pod copies running. More than
  # one copy teaches availability and rolling updates: one pod can be replaced or fail
  # while another continues serving traffic.
  replicas: 3

  # The selector is the ownership contract between Deployment and pods.
  # Every pod that belongs to this Deployment must carry these labels.
  selector:
    matchLabels:
      app: inference-gateway
      tier: backend

  # RollingUpdate means Kubernetes does not delete all old pods at once.
  # Instead, it creates some new pods, waits for readiness, and gradually replaces the old set.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # CONFIGURATION EXPLANATION `1` is how many pods may be unavailable during a rollout or disruption. It is
      # a safety valve: updates can proceed, but Kubernetes must keep enough capacity
      # alive for users.
      maxUnavailable: 1
      # CONFIGURATION EXPLANATION `1` allows Kubernetes to create temporary extra pods during a rollout. This
      # adds short-term capacity so new pods can become ready before old pods are
      # removed.
      maxSurge: 1

  template:
    metadata:
      labels:
        app: inference-gateway
        tier: backend
        app.kubernetes.io/name: inference-gateway
        app.kubernetes.io/version: "1.0.0"

    spec:
      # Spread replicas across nodes so a single worker node failure does not wipe out every copy.
      # This is especially important for edge-facing workloads.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: inference-gateway

      containers:
        - name: gateway

          # The image is intentionally simple so the module can focus on Deployment behavior.
          # ENTERPRISE:
          #   Replace this with an internally built, scanned, and signed image.
          # CONFIGURATION EXPLANATION `python:3.11.11-slim` is the container image that will run in the pod. The
          # tag is part of the release decision: production teams avoid unpinned
          # `latest` images so rollbacks, audits, and vulnerability scans know exactly
          # which artifact was deployed.
          image: python:3.11.11-slim
          # CONFIGURATION EXPLANATION `IfNotPresent` tells kubelet when to pull the image from a registry. In
          # this lab it avoids unnecessary downloads; in production the pull policy is
          # chosen together with immutable image tags so deployments are both
          # repeatable and fresh when intended.
          imagePullPolicy: IfNotPresent

          command:
            - /bin/sh
            - -c
            - |
              python - <<'PY'
              """
              Module: inline_gateway_server
              Purpose: Expose a tiny HTTP API that helps the learner see:
                1. which pod answered the request
                2. which version the Deployment is currently serving
                3. how a gateway would call a sibling backend once a Service exists
              Inputs:
                - APP_VERSION from the Deployment
                - POD_NAME and POD_NAMESPACE from the Downward API
                - RISK_PROFILE_API_BASE_URL pointing at the sibling backend Service
              Outputs:
                - JSON responses for /, /health, /ready, and /dependencies
              Failure behavior:
                - If the sibling backend Service does not exist yet, /dependencies
                  returns a structured failure payload instead of crashing.
              Enterprise equivalent:
                - A real API gateway or BFF service would use a full framework
                  such as FastAPI, Spring Boot, Go net/http, or Node.js, but the
                  Deployment behavior is the same.
              """

              from http.server import BaseHTTPRequestHandler, HTTPServer
              import json
              import os
              import socket
              import time
              import urllib.error
              import urllib.request

              APP_VERSION = os.getenv("APP_VERSION", "1.0.0")
              POD_NAME = os.getenv("POD_NAME", "unknown-pod")
              POD_NAMESPACE = os.getenv("POD_NAMESPACE", "unknown-namespace")
              RISK_PROFILE_API_BASE_URL = os.getenv(
                  "RISK_PROFILE_API_BASE_URL",
                  "http://risk-profile-api-clusterip",
              )
              STARTED = time.time()


              def fetch_dependency_status() -> dict[str, object]:
                  """Query the sibling backend through its Service DNS name."""
                  request_url = f"{RISK_PROFILE_API_BASE_URL}/profile/rules"
                  try:
                      with urllib.request.urlopen(request_url, timeout=2) as response:
                          body = response.read().decode("utf-8")
                          return {
                              "reachable": True,
                              "request_url": request_url,
                              "status_code": response.status,
                              "response": json.loads(body),
                          }
                  except urllib.error.URLError as exc:
                      return {
                          "reachable": False,
                          "request_url": request_url,
                          "error": str(exc),
                      }
                  except Exception as exc:
                      return {
                          "reachable": False,
                          "request_url": request_url,
                          "error": f"unexpected-error: {exc}",
                      }


              class Handler(BaseHTTPRequestHandler):
                  """Return JSON so the learner can inspect rollout and dependency state."""

                  def _send(self, code: int, payload: dict[str, object]) -> None:
                      body = json.dumps(payload).encode("utf-8")
                      self.send_response(code)
                      self.send_header("Content-Type", "application/json")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)

                  def do_GET(self) -> None:
                      if self.path == "/health":
                          self._send(
                              200,
                              {
                                  "status": "ok",
                                  "service": "inference-gateway",
                                  "version": APP_VERSION,
                              },
                          )
                          return

                      if self.path == "/ready":
                          ready = (time.time() - STARTED) > 5
                          if ready:
                              self._send(
                                  200,
                                  {
                                      "ready": True,
                                      "service": "inference-gateway",
                                      "version": APP_VERSION,
                                  },
                              )
                          else:
                              self._send(
                                  503,
                                  {
                                      "ready": False,
                                      "service": "inference-gateway",
                                      "version": APP_VERSION,
                                  },
                              )
                          return

                      if self.path == "/dependencies":
                          self._send(
                              200,
                              {
                                  "service": "inference-gateway",
                                  "version": APP_VERSION,
                                  "pod_name": POD_NAME,
                                  "pod_namespace": POD_NAMESPACE,
                                  "hostname": socket.gethostname(),
                                  "dependency_check": fetch_dependency_status(),
                              },
                          )
                          return

                      self._send(
                          200,
                          {
                              "service": "inference-gateway",
                              "role": "edge-service",
                              "version": APP_VERSION,
                              "pod_name": POD_NAME,
                              "pod_namespace": POD_NAMESPACE,
                              "hostname": socket.gethostname(),
                              "next_module_message": (
                                  "This Deployment owns gateway pods only. "
                                  "Stable communication to sibling Deployments "
                                  "is introduced by Services in setup/05-services."
                              ),
                              "paths": ["/health", "/ready", "/dependencies"],
                          },
                      )


              HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
              PY

          ports:
            - name: http
              # CONFIGURATION EXPLANATION `8080` is the port the process inside the container listens on. A
              # Service targetPort or probe must point here; if the numbers do not
              # line up, the pod can be running while traffic still fails.
              containerPort: 8080

          env:
            # APP_VERSION is deliberately surfaced so you can watch rollout state from live traffic.
            - name: APP_VERSION
              value: "1.0.0"

            # Downward API fields let a container learn which pod/namespace it belongs to.
            # In production, these are frequently included in logs and metrics tags.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

            # This is the key teaching bridge between module 04 and module 05.
            # The gateway does NOT talk to a sibling Deployment by Deployment name.
            # It talks to a Service DNS name that represents the sibling pods.
            #
            # LOCAL:
            #   The Service appears in setup/05-services as risk-profile-api-clusterip.
            # ENTERPRISE:
            #   The same pattern exists in production: service-a talks to service-b
            #   via stable DNS, not by chasing changing pod IPs.
            - name: RISK_PROFILE_API_BASE_URL
              value: "http://risk-profile-api-clusterip"

          # CONFIGURATION EXPLANATION `resources` lists the object types this permission applies to, such as
          # pods, services, or secrets. Least privilege means naming only the
          # resources the workload actually needs, not granting access to everything.
          resources:
            # CONFIGURATION EXPLANATION Resource requests are the minimum CPU and memory the scheduler reserves
            # for this container. They affect which node the pod can land on and form
            # the baseline used by autoscaling, capacity planning, and cost
            # forecasting.
            requests:
              # CONFIGURATION EXPLANATION `100m` is a CPU amount; `100m` means one tenth of one CPU core.
              # Requests reserve scheduling capacity, while limits cap usage, so the
              # same-looking field can mean either baseline capacity or a hard ceiling
              # depending on its parent section.
              cpu: "100m"
              # CONFIGURATION EXPLANATION `128Mi` is a memory amount. Memory is not compressible like CPU: if a
              # container exceeds its memory limit, Kubernetes may kill it, so
              # production teams set this from observed usage plus headroom.
              memory: "128Mi"
            # CONFIGURATION EXPLANATION Resource limits are the maximum CPU and memory this container is allowed
            # to use. They protect the node and neighboring pods from one workload
            # consuming everything, which is a core multi-tenant production safety
            # rule.
            limits:
              # CONFIGURATION EXPLANATION `500m` is a CPU amount; `100m` means one tenth of one CPU core.
              # Requests reserve scheduling capacity, while limits cap usage, so the
              # same-looking field can mean either baseline capacity or a hard ceiling
              # depending on its parent section.
              cpu: "500m"
              # CONFIGURATION EXPLANATION `512Mi` is a memory amount. Memory is not compressible like CPU: if a
              # container exceeds its memory limit, Kubernetes may kill it, so
              # production teams set this from observed usage plus headroom.
              memory: "512Mi"

          # CONFIGURATION EXPLANATION A liveness probe asks whether the running container is stuck badly enough
          # that restarting it is the right recovery action. It is a self-healing
          # mechanism, not a traffic-routing check.
          livenessProbe:
            httpGet:
              # CONFIGURATION EXPLANATION `/health` is the HTTP path Kubernetes calls for this check. The
              # application team owns what this endpoint means; production readiness
              # endpoints should verify serving ability, while liveness endpoints
              # should stay simple enough to avoid false restarts.
              path: /health
              # CONFIGURATION EXPLANATION `http` is the Service port clients use. A Service gives callers a
              # stable address even when pods are replaced, so this value becomes part
              # of the internal API contract between workloads.
              port: http
            # CONFIGURATION EXPLANATION `initialDelaySeconds: 15` waits after container start before probing,
            # giving the process time to open its port. Probe timing is a production
            # tradeoff: faster detection helps recovery, but overly aggressive values
            # create false alarms during normal load.
            initialDelaySeconds: 15
            # CONFIGURATION EXPLANATION `periodSeconds: 20` sets how often Kubernetes repeats the probe. Probe
            # timing is a production tradeoff: faster detection helps recovery, but
            # overly aggressive values create false alarms during normal load.
            periodSeconds: 20
            # CONFIGURATION EXPLANATION `timeoutSeconds: 5` sets how long Kubernetes waits for one probe
            # response before counting it as failed. Probe timing is a production
            # tradeoff: faster detection helps recovery, but overly aggressive values
            # create false alarms during normal load.
            timeoutSeconds: 5
            # CONFIGURATION EXPLANATION `failureThreshold: 3` sets how many failed probes Kubernetes tolerates
            # before marking the pod unhealthy or not ready. Probe timing is a
            # production tradeoff: faster detection helps recovery, but overly
            # aggressive values create false alarms during normal load.
            failureThreshold: 3

          # CONFIGURATION EXPLANATION A readiness probe asks whether this pod should receive Service traffic
          # right now. A pod can be alive but not ready, for example while loading
          # config, warming caches, or waiting for a dependency.
          readinessProbe:
            httpGet:
              # CONFIGURATION EXPLANATION `/ready` is the HTTP path Kubernetes calls for this check. The
              # application team owns what this endpoint means; production readiness
              # endpoints should verify serving ability, while liveness endpoints
              # should stay simple enough to avoid false restarts.
              path: /ready
              # CONFIGURATION EXPLANATION `http` is the Service port clients use. A Service gives callers a
              # stable address even when pods are replaced, so this value becomes part
              # of the internal API contract between workloads.
              port: http
            # CONFIGURATION EXPLANATION `initialDelaySeconds: 5` waits after container start before probing,
            # giving the process time to open its port. Probe timing is a production
            # tradeoff: faster detection helps recovery, but overly aggressive values
            # create false alarms during normal load.
            initialDelaySeconds: 5
            # CONFIGURATION EXPLANATION `periodSeconds: 5` sets how often Kubernetes repeats the probe. Probe
            # timing is a production tradeoff: faster detection helps recovery, but
            # overly aggressive values create false alarms during normal load.
            periodSeconds: 5
            # CONFIGURATION EXPLANATION `timeoutSeconds: 3` sets how long Kubernetes waits for one probe
            # response before counting it as failed. Probe timing is a production
            # tradeoff: faster detection helps recovery, but overly aggressive values
            # create false alarms during normal load.
            timeoutSeconds: 3
            # CONFIGURATION EXPLANATION `failureThreshold: 12` sets how many failed probes Kubernetes tolerates
            # before marking the pod unhealthy or not ready. Probe timing is a
            # production tradeoff: faster detection helps recovery, but overly
            # aggressive values create false alarms during normal load.
            failureThreshold: 12

          lifecycle:
            preStop:
              exec:
                # This small delay lets a Service or external load balancer stop routing new traffic
                # before the process fully exits.
                command: ["/bin/sh", "-c", "sleep 5"]

      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst

# =============================================================================
# WHAT THIS FILE TEACHES
#
# 1. One Deployment usually owns one stateless service role.
# 2. A cluster can have many sibling Deployments at the same time.
# 3. Deployments manage pod lifecycle, rollout, rollback, and scaling.
# 4. Deployments do NOT provide stable service-to-service networking by themselves.
# 5. The next module adds Services so this gateway can call the sibling backend reliably.
# =============================================================================
