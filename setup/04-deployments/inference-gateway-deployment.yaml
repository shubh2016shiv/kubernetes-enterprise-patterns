# =============================================================================
# FILE:    inference-gateway-deployment.yaml
# KIND:    Deployment
# PURPOSE: Teaches the standard Kubernetes controller for a stateless edge
#          service. This gateway represents the "front door" Deployment that
#          later receives traffic through a Service and calls a sibling backend.
# WHEN:    setup/04-deployments - after the learner understands raw Pods.
# ENTERPRISE EQUIVALENT: This same pattern is used for API gateways, internal
#                        stateless APIs, and web backends on AWS EKS, Google
#                        GKE, and Azure AKS. In production, the image usually
#                        comes from an internal OCI registry and a GitOps tool
#                        applies the rollout instead of a human typing kubectl.
# =============================================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  name: inference-gateway-deployment
  namespace: applications
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: edge-gateway
    app.kubernetes.io/part-of: platform-networking-lab
    app: inference-gateway
    tier: backend
  annotations:
    description: "Front-door Deployment used to teach rollout, rollback, scaling, and multi-Deployment thinking"

spec:
  # Three replicas is a common starting point for a stateless traffic-serving API.
  # Why not one?
  #   One replica means every restart becomes downtime.
  # Why not two?
  #   Two is better, but three makes availability and rolling updates easier to reason about.
  # LOCAL:
  #   Three lightweight replicas still fit on the 16 GB learner machine.
  # ENTERPRISE:
  #   A production gateway often starts at 3+ replicas and then scales with HPA.
  replicas: 3

  # The selector is the ownership contract between Deployment and pods.
  # Every pod that belongs to this Deployment must carry these labels.
  selector:
    matchLabels:
      app: inference-gateway
      tier: backend

  # RollingUpdate means Kubernetes does not delete all old pods at once.
  # Instead, it creates some new pods, waits for readiness, and gradually replaces the old set.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        app: inference-gateway
        tier: backend
        app.kubernetes.io/name: inference-gateway
        app.kubernetes.io/version: "1.0.0"

    spec:
      # Spread replicas across nodes so a single worker node failure does not wipe out every copy.
      # This is especially important for edge-facing workloads.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: inference-gateway

      containers:
        - name: gateway

          # The image is intentionally simple so the module can focus on Deployment behavior.
          # ENTERPRISE:
          #   Replace this with an internally built, scanned, and signed image.
          image: python:3.11.11-slim
          imagePullPolicy: IfNotPresent

          command:
            - /bin/sh
            - -c
            - |
              python - <<'PY'
              """
              Module: inline_gateway_server
              Purpose: Expose a tiny HTTP API that helps the learner see:
                1. which pod answered the request
                2. which version the Deployment is currently serving
                3. how a gateway would call a sibling backend once a Service exists
              Inputs:
                - APP_VERSION from the Deployment
                - POD_NAME and POD_NAMESPACE from the Downward API
                - RISK_PROFILE_API_BASE_URL pointing at the sibling backend Service
              Outputs:
                - JSON responses for /, /health, /ready, and /dependencies
              Failure behavior:
                - If the sibling backend Service does not exist yet, /dependencies
                  returns a structured failure payload instead of crashing.
              Enterprise equivalent:
                - A real API gateway or BFF service would use a full framework
                  such as FastAPI, Spring Boot, Go net/http, or Node.js, but the
                  Deployment behavior is the same.
              """

              from http.server import BaseHTTPRequestHandler, HTTPServer
              import json
              import os
              import socket
              import time
              import urllib.error
              import urllib.request

              APP_VERSION = os.getenv("APP_VERSION", "1.0.0")
              POD_NAME = os.getenv("POD_NAME", "unknown-pod")
              POD_NAMESPACE = os.getenv("POD_NAMESPACE", "unknown-namespace")
              RISK_PROFILE_API_BASE_URL = os.getenv(
                  "RISK_PROFILE_API_BASE_URL",
                  "http://risk-profile-api-clusterip",
              )
              STARTED = time.time()


              def fetch_dependency_status() -> dict[str, object]:
                  """Query the sibling backend through its Service DNS name."""
                  request_url = f"{RISK_PROFILE_API_BASE_URL}/profile/rules"
                  try:
                      with urllib.request.urlopen(request_url, timeout=2) as response:
                          body = response.read().decode("utf-8")
                          return {
                              "reachable": True,
                              "request_url": request_url,
                              "status_code": response.status,
                              "response": json.loads(body),
                          }
                  except urllib.error.URLError as exc:
                      return {
                          "reachable": False,
                          "request_url": request_url,
                          "error": str(exc),
                      }
                  except Exception as exc:
                      return {
                          "reachable": False,
                          "request_url": request_url,
                          "error": f"unexpected-error: {exc}",
                      }


              class Handler(BaseHTTPRequestHandler):
                  """Return JSON so the learner can inspect rollout and dependency state."""

                  def _send(self, code: int, payload: dict[str, object]) -> None:
                      body = json.dumps(payload).encode("utf-8")
                      self.send_response(code)
                      self.send_header("Content-Type", "application/json")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)

                  def do_GET(self) -> None:
                      if self.path == "/health":
                          self._send(
                              200,
                              {
                                  "status": "ok",
                                  "service": "inference-gateway",
                                  "version": APP_VERSION,
                              },
                          )
                          return

                      if self.path == "/ready":
                          ready = (time.time() - STARTED) > 5
                          if ready:
                              self._send(
                                  200,
                                  {
                                      "ready": True,
                                      "service": "inference-gateway",
                                      "version": APP_VERSION,
                                  },
                              )
                          else:
                              self._send(
                                  503,
                                  {
                                      "ready": False,
                                      "service": "inference-gateway",
                                      "version": APP_VERSION,
                                  },
                              )
                          return

                      if self.path == "/dependencies":
                          self._send(
                              200,
                              {
                                  "service": "inference-gateway",
                                  "version": APP_VERSION,
                                  "pod_name": POD_NAME,
                                  "pod_namespace": POD_NAMESPACE,
                                  "hostname": socket.gethostname(),
                                  "dependency_check": fetch_dependency_status(),
                              },
                          )
                          return

                      self._send(
                          200,
                          {
                              "service": "inference-gateway",
                              "role": "edge-service",
                              "version": APP_VERSION,
                              "pod_name": POD_NAME,
                              "pod_namespace": POD_NAMESPACE,
                              "hostname": socket.gethostname(),
                              "next_module_message": (
                                  "This Deployment owns gateway pods only. "
                                  "Stable communication to sibling Deployments "
                                  "is introduced by Services in setup/05-services."
                              ),
                              "paths": ["/health", "/ready", "/dependencies"],
                          },
                      )


              HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
              PY

          ports:
            - name: http
              containerPort: 8080

          env:
            # APP_VERSION is deliberately surfaced so you can watch rollout state from live traffic.
            - name: APP_VERSION
              value: "1.0.0"

            # Downward API fields let a container learn which pod/namespace it belongs to.
            # In production, these are frequently included in logs and metrics tags.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

            # This is the key teaching bridge between module 04 and module 05.
            # The gateway does NOT talk to a sibling Deployment by Deployment name.
            # It talks to a Service DNS name that represents the sibling pods.
            #
            # LOCAL:
            #   The Service appears in setup/05-services as risk-profile-api-clusterip.
            # ENTERPRISE:
            #   The same pattern exists in production: service-a talks to service-b
            #   via stable DNS, not by chasing changing pod IPs.
            - name: RISK_PROFILE_API_BASE_URL
              value: "http://risk-profile-api-clusterip"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12

          lifecycle:
            preStop:
              exec:
                # This small delay lets a Service or external load balancer stop routing new traffic
                # before the process fully exits.
                command: ["/bin/sh", "-c", "sleep 5"]

      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst

# =============================================================================
# WHAT THIS FILE TEACHES
#
# 1. One Deployment usually owns one stateless service role.
# 2. A cluster can have many sibling Deployments at the same time.
# 3. Deployments manage pod lifecycle, rollout, rollback, and scaling.
# 4. Deployments do NOT provide stable service-to-service networking by themselves.
# 5. The next module adds Services so this gateway can call the sibling backend reliably.
# =============================================================================
