# =============================================================================
# FILE:    risk-profile-api-deployment.yaml
# KIND:    Deployment
# PURPOSE: Provide a second meaningful Deployment so the learner can see that
#          real clusters run many sibling Deployments side by side. This backend
#          later becomes the internal dependency that the gateway reaches through
#          a Service in the next module.
# WHEN:    setup/04-deployments - read alongside inference-gateway-deployment.yaml.
# ENTERPRISE EQUIVALENT: This represents the typical internal API that sits
#                        behind an edge service. The exact business domain could
#                        be account profiles, risk rules, pricing, or feature
#                        flags. The Deployment mechanics are the same.
# =============================================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  # CONFIGURATION EXPLANATION `risk-profile-api-deployment` is the Kubernetes API name for this Deployment.
  # Humans and automation use this name in kubectl commands, audit logs, and incident
  # runbooks, so changing it must be deliberate and coordinated with scripts that
  # reference it.
  name: risk-profile-api-deployment
  # CONFIGURATION EXPLANATION `applications` is the namespace where this object is stored. A namespace is a
  # named boundary inside one cluster for permissions, quotas, network rules, and
  # cleanup; putting this object in the wrong namespace makes selectors and scripts
  # miss it.
  namespace: applications
  labels:
    app.kubernetes.io/name: risk-profile-api
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: internal-api
    app.kubernetes.io/part-of: platform-networking-lab
    # CONFIGURATION EXPLANATION `app: risk-profile-api` is a label used as a matching contract. Deployment
    # selectors, pod template labels, and Service selectors must agree on this value,
    # or Kubernetes will create objects that cannot find the pods they are supposed to
    # manage or route to.
    app: risk-profile-api
    tier: backend
  annotations:
    description: "Sibling backend Deployment used to teach multi-Deployment platforms"

spec:
  # Two replicas are enough to show a distinct backend Deployment without using too much laptop capacity.
  # ENTERPRISE:
  #   Internal APIs often also start at 2-3 replicas, then scale based on SLOs and traffic.
  # CONFIGURATION EXPLANATION `2` replicas means Kubernetes should keep that many pod copies running. More than
  # one copy teaches availability and rolling updates: one pod can be replaced or fail
  # while another continues serving traffic.
  replicas: 2

  selector:
    matchLabels:
      app: risk-profile-api
      tier: backend

  strategy:
    type: RollingUpdate
    rollingUpdate:
      # CONFIGURATION EXPLANATION `1` is how many pods may be unavailable during a rollout or disruption. It is
      # a safety valve: updates can proceed, but Kubernetes must keep enough capacity
      # alive for users.
      maxUnavailable: 1
      # CONFIGURATION EXPLANATION `1` allows Kubernetes to create temporary extra pods during a rollout. This
      # adds short-term capacity so new pods can become ready before old pods are
      # removed.
      maxSurge: 1

  template:
    metadata:
      labels:
        app: risk-profile-api
        tier: backend
        app.kubernetes.io/name: risk-profile-api
        app.kubernetes.io/version: "1.0.0"

    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: risk-profile-api

      containers:
        - name: api
          # CONFIGURATION EXPLANATION `python:3.11.11-slim` is the container image that will run in the pod. The
          # tag is part of the release decision: production teams avoid unpinned
          # `latest` images so rollbacks, audits, and vulnerability scans know exactly
          # which artifact was deployed.
          image: python:3.11.11-slim
          # CONFIGURATION EXPLANATION `IfNotPresent` tells kubelet when to pull the image from a registry. In
          # this lab it avoids unnecessary downloads; in production the pull policy is
          # chosen together with immutable image tags so deployments are both
          # repeatable and fresh when intended.
          imagePullPolicy: IfNotPresent

          command:
            - /bin/sh
            - -c
            - |
              python - <<'PY'
              """
              Module: inline_risk_profile_api
              Purpose: Expose a tiny internal API so the learner can see that a
              second Deployment can exist independently from the gateway.
              Inputs:
                - APP_VERSION
                - POD_NAME and POD_NAMESPACE from the Downward API
              Outputs:
                - JSON responses for /, /health, /ready, and /profile/rules
              Failure behavior:
                - The process does not depend on any external service, so failures
                  here are isolated to this Deployment.
              Enterprise equivalent:
                - A real internal API would likely have a database, cache, auth,
                  and metrics integration, but the Deployment contract is unchanged.
              """

              from http.server import BaseHTTPRequestHandler, HTTPServer
              import json
              import os
              import socket
              import time

              APP_VERSION = os.getenv("APP_VERSION", "1.0.0")
              POD_NAME = os.getenv("POD_NAME", "unknown-pod")
              POD_NAMESPACE = os.getenv("POD_NAMESPACE", "unknown-namespace")
              STARTED = time.time()


              class Handler(BaseHTTPRequestHandler):
                  """Return backend identity and a pretend rules payload."""

                  def _send(self, code: int, payload: dict[str, object]) -> None:
                      body = json.dumps(payload).encode("utf-8")
                      self.send_response(code)
                      self.send_header("Content-Type", "application/json")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)

                  def do_GET(self) -> None:
                      if self.path == "/health":
                          self._send(200, {"status": "ok", "service": "risk-profile-api"})
                          return

                      if self.path == "/ready":
                          ready = (time.time() - STARTED) > 3
                          if ready:
                              self._send(200, {"ready": True, "service": "risk-profile-api"})
                          else:
                              self._send(503, {"ready": False, "service": "risk-profile-api"})
                          return

                      if self.path == "/profile/rules":
                          self._send(
                              200,
                              {
                                  "service": "risk-profile-api",
                                  "version": APP_VERSION,
                                  "pod_name": POD_NAME,
                                  "pod_namespace": POD_NAMESPACE,
                                  "hostname": socket.gethostname(),
                                  "rules": [
                                      "income_verification_required",
                                      "geo_risk_check_enabled",
                                      "device_reputation_scored",
                                  ],
                              },
                          )
                          return

                      self._send(
                          200,
                          {
                              "service": "risk-profile-api",
                              "role": "internal-backend",
                              "version": APP_VERSION,
                              "pod_name": POD_NAME,
                              "pod_namespace": POD_NAMESPACE,
                              "hostname": socket.gethostname(),
                              "paths": ["/health", "/ready", "/profile/rules"],
                          },
                      )


              HTTPServer(("0.0.0.0", 8081), Handler).serve_forever()
              PY

          ports:
            - name: http
              # CONFIGURATION EXPLANATION `8081` is the port the process inside the container listens on. A
              # Service targetPort or probe must point here; if the numbers do not
              # line up, the pod can be running while traffic still fails.
              containerPort: 8081

          env:
            - name: APP_VERSION
              value: "1.0.0"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          # CONFIGURATION EXPLANATION `resources` lists the object types this permission applies to, such as
          # pods, services, or secrets. Least privilege means naming only the
          # resources the workload actually needs, not granting access to everything.
          resources:
            # CONFIGURATION EXPLANATION Resource requests are the minimum CPU and memory the scheduler reserves
            # for this container. They affect which node the pod can land on and form
            # the baseline used by autoscaling, capacity planning, and cost
            # forecasting.
            requests:
              # CONFIGURATION EXPLANATION `75m` is a CPU amount; `100m` means one tenth of one CPU core.
              # Requests reserve scheduling capacity, while limits cap usage, so the
              # same-looking field can mean either baseline capacity or a hard ceiling
              # depending on its parent section.
              cpu: "75m"
              # CONFIGURATION EXPLANATION `96Mi` is a memory amount. Memory is not compressible like CPU: if a
              # container exceeds its memory limit, Kubernetes may kill it, so
              # production teams set this from observed usage plus headroom.
              memory: "96Mi"
            # CONFIGURATION EXPLANATION Resource limits are the maximum CPU and memory this container is allowed
            # to use. They protect the node and neighboring pods from one workload
            # consuming everything, which is a core multi-tenant production safety
            # rule.
            limits:
              # CONFIGURATION EXPLANATION `300m` is a CPU amount; `100m` means one tenth of one CPU core.
              # Requests reserve scheduling capacity, while limits cap usage, so the
              # same-looking field can mean either baseline capacity or a hard ceiling
              # depending on its parent section.
              cpu: "300m"
              # CONFIGURATION EXPLANATION `256Mi` is a memory amount. Memory is not compressible like CPU: if a
              # container exceeds its memory limit, Kubernetes may kill it, so
              # production teams set this from observed usage plus headroom.
              memory: "256Mi"

          # CONFIGURATION EXPLANATION A liveness probe asks whether the running container is stuck badly enough
          # that restarting it is the right recovery action. It is a self-healing
          # mechanism, not a traffic-routing check.
          livenessProbe:
            httpGet:
              # CONFIGURATION EXPLANATION `/health` is the HTTP path Kubernetes calls for this check. The
              # application team owns what this endpoint means; production readiness
              # endpoints should verify serving ability, while liveness endpoints
              # should stay simple enough to avoid false restarts.
              path: /health
              # CONFIGURATION EXPLANATION `http` is the Service port clients use. A Service gives callers a
              # stable address even when pods are replaced, so this value becomes part
              # of the internal API contract between workloads.
              port: http
            # CONFIGURATION EXPLANATION `initialDelaySeconds: 10` waits after container start before probing,
            # giving the process time to open its port. Probe timing is a production
            # tradeoff: faster detection helps recovery, but overly aggressive values
            # create false alarms during normal load.
            initialDelaySeconds: 10
            # CONFIGURATION EXPLANATION `periodSeconds: 20` sets how often Kubernetes repeats the probe. Probe
            # timing is a production tradeoff: faster detection helps recovery, but
            # overly aggressive values create false alarms during normal load.
            periodSeconds: 20
            # CONFIGURATION EXPLANATION `timeoutSeconds: 5` sets how long Kubernetes waits for one probe
            # response before counting it as failed. Probe timing is a production
            # tradeoff: faster detection helps recovery, but overly aggressive values
            # create false alarms during normal load.
            timeoutSeconds: 5
            # CONFIGURATION EXPLANATION `failureThreshold: 3` sets how many failed probes Kubernetes tolerates
            # before marking the pod unhealthy or not ready. Probe timing is a
            # production tradeoff: faster detection helps recovery, but overly
            # aggressive values create false alarms during normal load.
            failureThreshold: 3

          # CONFIGURATION EXPLANATION A readiness probe asks whether this pod should receive Service traffic
          # right now. A pod can be alive but not ready, for example while loading
          # config, warming caches, or waiting for a dependency.
          readinessProbe:
            httpGet:
              # CONFIGURATION EXPLANATION `/ready` is the HTTP path Kubernetes calls for this check. The
              # application team owns what this endpoint means; production readiness
              # endpoints should verify serving ability, while liveness endpoints
              # should stay simple enough to avoid false restarts.
              path: /ready
              # CONFIGURATION EXPLANATION `http` is the Service port clients use. A Service gives callers a
              # stable address even when pods are replaced, so this value becomes part
              # of the internal API contract between workloads.
              port: http
            # CONFIGURATION EXPLANATION `initialDelaySeconds: 3` waits after container start before probing,
            # giving the process time to open its port. Probe timing is a production
            # tradeoff: faster detection helps recovery, but overly aggressive values
            # create false alarms during normal load.
            initialDelaySeconds: 3
            # CONFIGURATION EXPLANATION `periodSeconds: 5` sets how often Kubernetes repeats the probe. Probe
            # timing is a production tradeoff: faster detection helps recovery, but
            # overly aggressive values create false alarms during normal load.
            periodSeconds: 5
            # CONFIGURATION EXPLANATION `timeoutSeconds: 3` sets how long Kubernetes waits for one probe
            # response before counting it as failed. Probe timing is a production
            # tradeoff: faster detection helps recovery, but overly aggressive values
            # create false alarms during normal load.
            timeoutSeconds: 3
            # CONFIGURATION EXPLANATION `failureThreshold: 12` sets how many failed probes Kubernetes tolerates
            # before marking the pod unhealthy or not ready. Probe timing is a
            # production tradeoff: faster detection helps recovery, but overly
            # aggressive values create false alarms during normal load.
            failureThreshold: 12

      terminationGracePeriodSeconds: 20
      dnsPolicy: ClusterFirst

# =============================================================================
# WHAT THIS FILE TEACHES
#
# 1. A real application stack is usually many Deployments, not one.
# 2. Each Deployment owns only its own pod template and replica count.
# 3. The gateway Deployment does not "contain" this backend Deployment.
# 4. They become a working application graph only after Services provide stable discovery.
# =============================================================================
