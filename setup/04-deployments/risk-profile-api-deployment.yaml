# =============================================================================
# FILE:    risk-profile-api-deployment.yaml
# KIND:    Deployment
# PURPOSE: Provide a second meaningful Deployment so the learner can see that
#          real clusters run many sibling Deployments side by side. This backend
#          later becomes the internal dependency that the gateway reaches through
#          a Service in the next module.
# WHEN:    setup/04-deployments - read alongside inference-gateway-deployment.yaml.
# ENTERPRISE EQUIVALENT: This represents the typical internal API that sits
#                        behind an edge service. The exact business domain could
#                        be account profiles, risk rules, pricing, or feature
#                        flags. The Deployment mechanics are the same.
# =============================================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  name: risk-profile-api-deployment
  namespace: applications
  labels:
    app.kubernetes.io/name: risk-profile-api
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: internal-api
    app.kubernetes.io/part-of: platform-networking-lab
    app: risk-profile-api
    tier: backend
  annotations:
    description: "Sibling backend Deployment used to teach multi-Deployment platforms"

spec:
  # Two replicas are enough to show a distinct backend Deployment without using too much laptop capacity.
  # ENTERPRISE:
  #   Internal APIs often also start at 2-3 replicas, then scale based on SLOs and traffic.
  replicas: 2

  selector:
    matchLabels:
      app: risk-profile-api
      tier: backend

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        app: risk-profile-api
        tier: backend
        app.kubernetes.io/name: risk-profile-api
        app.kubernetes.io/version: "1.0.0"

    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: risk-profile-api

      containers:
        - name: api
          image: python:3.11.11-slim
          imagePullPolicy: IfNotPresent

          command:
            - /bin/sh
            - -c
            - |
              python - <<'PY'
              """
              Module: inline_risk_profile_api
              Purpose: Expose a tiny internal API so the learner can see that a
              second Deployment can exist independently from the gateway.
              Inputs:
                - APP_VERSION
                - POD_NAME and POD_NAMESPACE from the Downward API
              Outputs:
                - JSON responses for /, /health, /ready, and /profile/rules
              Failure behavior:
                - The process does not depend on any external service, so failures
                  here are isolated to this Deployment.
              Enterprise equivalent:
                - A real internal API would likely have a database, cache, auth,
                  and metrics integration, but the Deployment contract is unchanged.
              """

              from http.server import BaseHTTPRequestHandler, HTTPServer
              import json
              import os
              import socket
              import time

              APP_VERSION = os.getenv("APP_VERSION", "1.0.0")
              POD_NAME = os.getenv("POD_NAME", "unknown-pod")
              POD_NAMESPACE = os.getenv("POD_NAMESPACE", "unknown-namespace")
              STARTED = time.time()


              class Handler(BaseHTTPRequestHandler):
                  """Return backend identity and a pretend rules payload."""

                  def _send(self, code: int, payload: dict[str, object]) -> None:
                      body = json.dumps(payload).encode("utf-8")
                      self.send_response(code)
                      self.send_header("Content-Type", "application/json")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)

                  def do_GET(self) -> None:
                      if self.path == "/health":
                          self._send(200, {"status": "ok", "service": "risk-profile-api"})
                          return

                      if self.path == "/ready":
                          ready = (time.time() - STARTED) > 3
                          if ready:
                              self._send(200, {"ready": True, "service": "risk-profile-api"})
                          else:
                              self._send(503, {"ready": False, "service": "risk-profile-api"})
                          return

                      if self.path == "/profile/rules":
                          self._send(
                              200,
                              {
                                  "service": "risk-profile-api",
                                  "version": APP_VERSION,
                                  "pod_name": POD_NAME,
                                  "pod_namespace": POD_NAMESPACE,
                                  "hostname": socket.gethostname(),
                                  "rules": [
                                      "income_verification_required",
                                      "geo_risk_check_enabled",
                                      "device_reputation_scored",
                                  ],
                              },
                          )
                          return

                      self._send(
                          200,
                          {
                              "service": "risk-profile-api",
                              "role": "internal-backend",
                              "version": APP_VERSION,
                              "pod_name": POD_NAME,
                              "pod_namespace": POD_NAMESPACE,
                              "hostname": socket.gethostname(),
                              "paths": ["/health", "/ready", "/profile/rules"],
                          },
                      )


              HTTPServer(("0.0.0.0", 8081), Handler).serve_forever()
              PY

          ports:
            - name: http
              containerPort: 8081

          env:
            - name: APP_VERSION
              value: "1.0.0"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          resources:
            requests:
              cpu: "75m"
              memory: "96Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12

      terminationGracePeriodSeconds: 20
      dnsPolicy: ClusterFirst

# =============================================================================
# WHAT THIS FILE TEACHES
#
# 1. A real application stack is usually many Deployments, not one.
# 2. Each Deployment owns only its own pod template and replica count.
# 3. The gateway Deployment does not "contain" this backend Deployment.
# 4. They become a working application graph only after Services provide stable discovery.
# =============================================================================
