# =============================================================================
# FILE:    health-checks-demo.yaml
# KIND:    Deployment, Service
# PURPOSE: Demonstrate startup, liveness, and readiness probes together, then
#          expose readiness behavior through Service endpoints.
# WHEN:    setup/09-health-checks - after reading the three focused probe files.
# ENTERPRISE EQUIVALENT: Real workloads on EKS, GKE, and AKS combine probes with
#                        Services, load balancers, and centralized logs so both
#                        Kubernetes and humans can understand application state.
# =============================================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  # CONFIGURATION EXPLANATION `probes-demo` is the Kubernetes API name for this Deployment. Humans and
  # automation use this name in kubectl commands, audit logs, and incident runbooks,
  # so changing it must be deliberate and coordinated with scripts that reference it.
  name: probes-demo
  # CONFIGURATION EXPLANATION `applications` is the namespace where this object is stored. A namespace is a
  # named boundary inside one cluster for permissions, quotas, network rules, and
  # cleanup; putting this object in the wrong namespace makes selectors and scripts
  # miss it.
  namespace: applications
  labels:
    # CONFIGURATION EXPLANATION `app: probes-demo` is a label used as a matching contract. Deployment selectors,
    # pod template labels, and Service selectors must agree on this value, or
    # Kubernetes will create objects that cannot find the pods they are supposed to
    # manage or route to.
    app: probes-demo
    app.kubernetes.io/name: probes-demo
    app.kubernetes.io/component: health-checks-demo
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Deployment that demonstrates startup, liveness, and readiness probes."

spec:
  # CONFIGURATION EXPLANATION `2` replicas means Kubernetes should keep that many pod copies running. More than
  # one copy teaches availability and rolling updates: one pod can be replaced or fail
  # while another continues serving traffic.
  replicas: 2

  selector:
    matchLabels:
      app: probes-demo

  template:
    metadata:
      labels:
        app: probes-demo
        tier: frontend

    spec:
      containers:
        - name: nginx
          # CONFIGURATION EXPLANATION `nginx:1.25.4` is the container image that will run in the pod. The tag is
          # part of the release decision: production teams avoid unpinned `latest`
          # images so rollbacks, audits, and vulnerability scans know exactly which
          # artifact was deployed.
          image: nginx:1.25.4
          # CONFIGURATION EXPLANATION `IfNotPresent` tells kubelet when to pull the image from a registry. In
          # this lab it avoids unnecessary downloads; in production the pull policy is
          # chosen together with immutable image tags so deployments are both
          # repeatable and fresh when intended.
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              # CONFIGURATION EXPLANATION `80` is the port the process inside the container listens on. A
              # Service targetPort or probe must point here; if the numbers do not
              # line up, the pod can be running while traffic still fails.
              containerPort: 80

          # CONFIGURATION EXPLANATION `resources` lists the object types this permission applies to, such as
          # pods, services, or secrets. Least privilege means naming only the
          # resources the workload actually needs, not granting access to everything.
          resources:
            # CONFIGURATION EXPLANATION Resource requests are the minimum CPU and memory the scheduler reserves
            # for this container. They affect which node the pod can land on and form
            # the baseline used by autoscaling, capacity planning, and cost
            # forecasting.
            requests:
              # CONFIGURATION EXPLANATION `75m` is a CPU amount; `100m` means one tenth of one CPU core.
              # Requests reserve scheduling capacity, while limits cap usage, so the
              # same-looking field can mean either baseline capacity or a hard ceiling
              # depending on its parent section.
              cpu: "75m"
              # CONFIGURATION EXPLANATION `96Mi` is a memory amount. Memory is not compressible like CPU: if a
              # container exceeds its memory limit, Kubernetes may kill it, so
              # production teams set this from observed usage plus headroom.
              memory: "96Mi"
            # CONFIGURATION EXPLANATION Resource limits are the maximum CPU and memory this container is allowed
            # to use. They protect the node and neighboring pods from one workload
            # consuming everything, which is a core multi-tenant production safety
            # rule.
            limits:
              # CONFIGURATION EXPLANATION `250m` is a CPU amount; `100m` means one tenth of one CPU core.
              # Requests reserve scheduling capacity, while limits cap usage, so the
              # same-looking field can mean either baseline capacity or a hard ceiling
              # depending on its parent section.
              cpu: "250m"
              # CONFIGURATION EXPLANATION `192Mi` is a memory amount. Memory is not compressible like CPU: if a
              # container exceeds its memory limit, Kubernetes may kill it, so
              # production teams set this from observed usage plus headroom.
              memory: "192Mi"

          # CONFIGURATION EXPLANATION A startup probe gives a slow application time to boot before liveness
          # checks are allowed to restart it. This prevents Kubernetes from killing a
          # healthy-but-still-starting process, which is common with JVM apps and ML
          # services.
          startupProbe:
            httpGet:
              # Startup asks: has the application finished booting?
              # CONFIGURATION EXPLANATION `/` is the HTTP path Kubernetes calls for this check. The application
              # team owns what this endpoint means; production readiness endpoints
              # should verify serving ability, while liveness endpoints should stay
              # simple enough to avoid false restarts.
              path: /
              # CONFIGURATION EXPLANATION `http` is the Service port clients use. A Service gives callers a
              # stable address even when pods are replaced, so this value becomes part
              # of the internal API contract between workloads.
              port: http
            # Maximum startup window = 30 * 5 = 150 seconds.
            # nginx starts quickly, but the large window teaches the slow-app pattern.
            # CONFIGURATION EXPLANATION `periodSeconds: 5` sets how often Kubernetes repeats the probe. Probe
            # timing is a production tradeoff: faster detection helps recovery, but
            # overly aggressive values create false alarms during normal load.
            periodSeconds: 5
            # CONFIGURATION EXPLANATION `failureThreshold: 30` sets how many failed probes Kubernetes tolerates
            # before marking the pod unhealthy or not ready. Probe timing is a
            # production tradeoff: faster detection helps recovery, but overly
            # aggressive values create false alarms during normal load.
            failureThreshold: 30
            # CONFIGURATION EXPLANATION `timeoutSeconds: 3` sets how long Kubernetes waits for one probe
            # response before counting it as failed. Probe timing is a production
            # tradeoff: faster detection helps recovery, but overly aggressive values
            # create false alarms during normal load.
            timeoutSeconds: 3

          # CONFIGURATION EXPLANATION A liveness probe asks whether the running container is stuck badly enough
          # that restarting it is the right recovery action. It is a self-healing
          # mechanism, not a traffic-routing check.
          livenessProbe:
            httpGet:
              # Liveness asks: is the application process still recoverable?
              # CONFIGURATION EXPLANATION `/` is the HTTP path Kubernetes calls for this check. The application
              # team owns what this endpoint means; production readiness endpoints
              # should verify serving ability, while liveness endpoints should stay
              # simple enough to avoid false restarts.
              path: /
              # CONFIGURATION EXPLANATION `http` is the Service port clients use. A Service gives callers a
              # stable address even when pods are replaced, so this value becomes part
              # of the internal API contract between workloads.
              port: http
            # After startup succeeds, check every 10 seconds.
            # CONFIGURATION EXPLANATION `periodSeconds: 10` sets how often Kubernetes repeats the probe. Probe
            # timing is a production tradeoff: faster detection helps recovery, but
            # overly aggressive values create false alarms during normal load.
            periodSeconds: 10
            # CONFIGURATION EXPLANATION `failureThreshold: 3` sets how many failed probes Kubernetes tolerates
            # before marking the pod unhealthy or not ready. Probe timing is a
            # production tradeoff: faster detection helps recovery, but overly
            # aggressive values create false alarms during normal load.
            failureThreshold: 3
            # CONFIGURATION EXPLANATION `timeoutSeconds: 5` sets how long Kubernetes waits for one probe
            # response before counting it as failed. Probe timing is a production
            # tradeoff: faster detection helps recovery, but overly aggressive values
            # create false alarms during normal load.
            timeoutSeconds: 5

          # CONFIGURATION EXPLANATION A readiness probe asks whether this pod should receive Service traffic
          # right now. A pod can be alive but not ready, for example while loading
          # config, warming caches, or waiting for a dependency.
          readinessProbe:
            httpGet:
              # Readiness asks: should this pod receive Service traffic?
              # CONFIGURATION EXPLANATION `/` is the HTTP path Kubernetes calls for this check. The application
              # team owns what this endpoint means; production readiness endpoints
              # should verify serving ability, while liveness endpoints should stay
              # simple enough to avoid false restarts.
              path: /
              # CONFIGURATION EXPLANATION `http` is the Service port clients use. A Service gives callers a
              # stable address even when pods are replaced, so this value becomes part
              # of the internal API contract between workloads.
              port: http
            # CONFIGURATION EXPLANATION `periodSeconds: 5` sets how often Kubernetes repeats the probe. Probe
            # timing is a production tradeoff: faster detection helps recovery, but
            # overly aggressive values create false alarms during normal load.
            periodSeconds: 5
            # CONFIGURATION EXPLANATION `failureThreshold: 3` sets how many failed probes Kubernetes tolerates
            # before marking the pod unhealthy or not ready. Probe timing is a
            # production tradeoff: faster detection helps recovery, but overly
            # aggressive values create false alarms during normal load.
            failureThreshold: 3
            # CONFIGURATION EXPLANATION `timeoutSeconds: 3` sets how long Kubernetes waits for one probe
            # response before counting it as failed. Probe timing is a production
            # tradeoff: faster detection helps recovery, but overly aggressive values
            # create false alarms during normal load.
            timeoutSeconds: 3
            # CONFIGURATION EXPLANATION `successThreshold: 2` sets how many successful readiness probes are
            # required before traffic is sent again. Probe timing is a production
            # tradeoff: faster detection helps recovery, but overly aggressive values
            # create false alarms during normal load.
            successThreshold: 2

---
# =============================================================================
# FILE:    health-checks-demo.yaml
# KIND:    Service
# PURPOSE: Provide a stable endpoint list so readiness changes can be observed
#          through Kubernetes Service endpoints.
# WHEN:    setup/09-health-checks - applied with the probes-demo Deployment.
# ENTERPRISE EQUIVALENT: In production, this Service may sit behind an ALB, GCLB,
#                        Application Gateway, or service mesh. Readiness still
#                        controls which pods are safe traffic targets.
# =============================================================================

apiVersion: v1
kind: Service

metadata:
  # CONFIGURATION EXPLANATION `probes-demo-service` is the Kubernetes API name for this Service. Humans and
  # automation use this name in kubectl commands, audit logs, and incident runbooks,
  # so changing it must be deliberate and coordinated with scripts that reference it.
  name: probes-demo-service
  # CONFIGURATION EXPLANATION `applications` is the namespace where this object is stored. A namespace is a
  # named boundary inside one cluster for permissions, quotas, network rules, and
  # cleanup; putting this object in the wrong namespace makes selectors and scripts
  # miss it.
  namespace: applications
  labels:
    app: probes-demo
    app.kubernetes.io/name: probes-demo
    app.kubernetes.io/component: health-checks-service
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "ClusterIP Service used to observe readiness through endpoints."

spec:
  # CONFIGURATION EXPLANATION ClusterIP keeps the Service reachable only inside the cluster. That is the normal
  # production choice for backend APIs because it reduces exposure: other pods can
  # call the service, but the internet cannot reach it directly.
  type: ClusterIP

  selector:
    # This must match the pod template labels above. If it does not, the Service
    # will exist but have no endpoints.
    app: probes-demo

  ports:
    - name: http
      protocol: TCP
      # CONFIGURATION EXPLANATION `80` is the Service port clients use. A Service gives callers a stable address
      # even when pods are replaced, so this value becomes part of the internal API
      # contract between workloads.
      port: 80
      # CONFIGURATION EXPLANATION `http` sends Service traffic to a container port or named port on matching
      # pods. This is the bridge between stable Service networking and the actual
      # application process inside each pod.
      targetPort: http

# =============================================================================
# WHAT TO OBSERVE
#
# kubectl get pods -n applications -l app=probes-demo
#   Shows READY 0/1 until readiness succeeds.
#
# kubectl get endpoints probes-demo-service -n applications
#   Shows pod IPs only for pods that are Ready.
#
# kubectl describe pod <pod-name> -n applications
#   Shows Conditions and Events that explain probe behavior.
#
# kubectl logs <pod-name> -n applications
#   Shows application logs. This is human visibility, not a Kubernetes decision.
# =============================================================================
