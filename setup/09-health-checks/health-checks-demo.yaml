# =============================================================================
# FILE:    health-checks-demo.yaml
# KIND:    Deployment, Service
# PURPOSE: Demonstrate startup, liveness, and readiness probes together, then
#          expose readiness behavior through Service endpoints.
# WHEN:    setup/09-health-checks - after reading the three focused probe files.
# ENTERPRISE EQUIVALENT: Real workloads on EKS, GKE, and AKS combine probes with
#                        Services, load balancers, and centralized logs so both
#                        Kubernetes and humans can understand application state.
# =============================================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  name: probes-demo
  namespace: applications
  labels:
    app: probes-demo
    app.kubernetes.io/name: probes-demo
    app.kubernetes.io/component: health-checks-demo
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Deployment that demonstrates startup, liveness, and readiness probes."

spec:
  replicas: 2

  selector:
    matchLabels:
      app: probes-demo

  template:
    metadata:
      labels:
        app: probes-demo
        tier: frontend

    spec:
      containers:
        - name: nginx
          image: nginx:1.25.4
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 80

          resources:
            requests:
              cpu: "75m"
              memory: "96Mi"
            limits:
              cpu: "250m"
              memory: "192Mi"

          startupProbe:
            httpGet:
              # Startup asks: has the application finished booting?
              path: /
              port: http
            # Maximum startup window = 30 * 5 = 150 seconds.
            # nginx starts quickly, but the large window teaches the slow-app pattern.
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 3

          livenessProbe:
            httpGet:
              # Liveness asks: is the application process still recoverable?
              path: /
              port: http
            # After startup succeeds, check every 10 seconds.
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              # Readiness asks: should this pod receive Service traffic?
              path: /
              port: http
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
            successThreshold: 2

---
# =============================================================================
# FILE:    health-checks-demo.yaml
# KIND:    Service
# PURPOSE: Provide a stable endpoint list so readiness changes can be observed
#          through Kubernetes Service endpoints.
# WHEN:    setup/09-health-checks - applied with the probes-demo Deployment.
# ENTERPRISE EQUIVALENT: In production, this Service may sit behind an ALB, GCLB,
#                        Application Gateway, or service mesh. Readiness still
#                        controls which pods are safe traffic targets.
# =============================================================================

apiVersion: v1
kind: Service

metadata:
  name: probes-demo-service
  namespace: applications
  labels:
    app: probes-demo
    app.kubernetes.io/name: probes-demo
    app.kubernetes.io/component: health-checks-service
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "ClusterIP Service used to observe readiness through endpoints."

spec:
  type: ClusterIP

  selector:
    # This must match the pod template labels above. If it does not, the Service
    # will exist but have no endpoints.
    app: probes-demo

  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http

# =============================================================================
# WHAT TO OBSERVE
#
# kubectl get pods -n applications -l app=probes-demo
#   Shows READY 0/1 until readiness succeeds.
#
# kubectl get endpoints probes-demo-service -n applications
#   Shows pod IPs only for pods that are Ready.
#
# kubectl describe pod <pod-name> -n applications
#   Shows Conditions and Events that explain probe behavior.
#
# kubectl logs <pod-name> -n applications
#   Shows application logs. This is human visibility, not a Kubernetes decision.
# =============================================================================
