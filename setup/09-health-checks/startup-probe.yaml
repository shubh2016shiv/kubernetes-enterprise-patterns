# =============================================================================
# FILE:    startup-probe.yaml
# KIND:    Deployment
# PURPOSE: Isolate startupProbe behavior so the learner can understand how
#          Kubernetes protects slow-starting applications.
# WHEN:    setup/09-health-checks - read before liveness and readiness probes.
# ENTERPRISE EQUIVALENT: Java, .NET, and ML services on EKS, GKE, and AKS often
#                        need generous startup probes while loading frameworks,
#                        caches, or model artifacts.
# =============================================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  # CONFIGURATION EXPLANATION `startup-probe-demo` is the Kubernetes API name for this Deployment. Humans and
  # automation use this name in kubectl commands, audit logs, and incident runbooks,
  # so changing it must be deliberate and coordinated with scripts that reference it.
  name: startup-probe-demo
  # CONFIGURATION EXPLANATION `applications` is the namespace where this object is stored. A namespace is a
  # named boundary inside one cluster for permissions, quotas, network rules, and
  # cleanup; putting this object in the wrong namespace makes selectors and scripts
  # miss it.
  namespace: applications
  labels:
    # CONFIGURATION EXPLANATION `app: startup-probe-demo` is a label used as a matching contract. Deployment
    # selectors, pod template labels, and Service selectors must agree on this value,
    # or Kubernetes will create objects that cannot find the pods they are supposed to
    # manage or route to.
    app: startup-probe-demo
    app.kubernetes.io/component: health-checks

spec:
  # CONFIGURATION EXPLANATION `1` replicas means Kubernetes should keep that many pod copies running. More than
  # one copy teaches availability and rolling updates: one pod can be replaced or fail
  # while another continues serving traffic.
  replicas: 1

  selector:
    matchLabels:
      app: startup-probe-demo

  template:
    metadata:
      labels:
        app: startup-probe-demo

    spec:
      containers:
        - name: nginx
          # CONFIGURATION EXPLANATION `nginx:1.25.4` is the container image that will run in the pod. The tag is
          # part of the release decision: production teams avoid unpinned `latest`
          # images so rollbacks, audits, and vulnerability scans know exactly which
          # artifact was deployed.
          image: nginx:1.25.4
          # CONFIGURATION EXPLANATION `IfNotPresent` tells kubelet when to pull the image from a registry. In
          # this lab it avoids unnecessary downloads; in production the pull policy is
          # chosen together with immutable image tags so deployments are both
          # repeatable and fresh when intended.
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              # CONFIGURATION EXPLANATION `80` is the port the process inside the container listens on. A
              # Service targetPort or probe must point here; if the numbers do not
              # line up, the pod can be running while traffic still fails.
              containerPort: 80

          # CONFIGURATION EXPLANATION `resources` lists the object types this permission applies to, such as
          # pods, services, or secrets. Least privilege means naming only the
          # resources the workload actually needs, not granting access to everything.
          resources:
            # CONFIGURATION EXPLANATION Resource requests are the minimum CPU and memory the scheduler reserves
            # for this container. They affect which node the pod can land on and form
            # the baseline used by autoscaling, capacity planning, and cost
            # forecasting.
            requests:
              # CONFIGURATION EXPLANATION `50m` is a CPU amount; `100m` means one tenth of one CPU core.
              # Requests reserve scheduling capacity, while limits cap usage, so the
              # same-looking field can mean either baseline capacity or a hard ceiling
              # depending on its parent section.
              cpu: "50m"
              # CONFIGURATION EXPLANATION `64Mi` is a memory amount. Memory is not compressible like CPU: if a
              # container exceeds its memory limit, Kubernetes may kill it, so
              # production teams set this from observed usage plus headroom.
              memory: "64Mi"
            # CONFIGURATION EXPLANATION Resource limits are the maximum CPU and memory this container is allowed
            # to use. They protect the node and neighboring pods from one workload
            # consuming everything, which is a core multi-tenant production safety
            # rule.
            limits:
              # CONFIGURATION EXPLANATION `200m` is a CPU amount; `100m` means one tenth of one CPU core.
              # Requests reserve scheduling capacity, while limits cap usage, so the
              # same-looking field can mean either baseline capacity or a hard ceiling
              # depending on its parent section.
              cpu: "200m"
              # CONFIGURATION EXPLANATION `128Mi` is a memory amount. Memory is not compressible like CPU: if a
              # container exceeds its memory limit, Kubernetes may kill it, so
              # production teams set this from observed usage plus headroom.
              memory: "128Mi"

          # CONFIGURATION EXPLANATION A startup probe gives a slow application time to boot before liveness
          # checks are allowed to restart it. This prevents Kubernetes from killing a
          # healthy-but-still-starting process, which is common with JVM apps and ML
          # services.
          startupProbe:
            httpGet:
              # CONFIGURATION EXPLANATION `/` is the HTTP path Kubernetes calls for this check. The application
              # team owns what this endpoint means; production readiness endpoints
              # should verify serving ability, while liveness endpoints should stay
              # simple enough to avoid false restarts.
              path: /
              # CONFIGURATION EXPLANATION `http` is the Service port clients use. A Service gives callers a
              # stable address even when pods are replaced, so this value becomes part
              # of the internal API contract between workloads.
              port: http
            # Maximum startup window = failureThreshold * periodSeconds.
            # Here: 30 * 5 = 150 seconds before Kubernetes restarts the container.
            # CONFIGURATION EXPLANATION `periodSeconds: 5` sets how often Kubernetes repeats the probe. Probe
            # timing is a production tradeoff: faster detection helps recovery, but
            # overly aggressive values create false alarms during normal load.
            periodSeconds: 5
            # CONFIGURATION EXPLANATION `failureThreshold: 30` sets how many failed probes Kubernetes tolerates
            # before marking the pod unhealthy or not ready. Probe timing is a
            # production tradeoff: faster detection helps recovery, but overly
            # aggressive values create false alarms during normal load.
            failureThreshold: 30
            # CONFIGURATION EXPLANATION `timeoutSeconds: 3` sets how long Kubernetes waits for one probe
            # response before counting it as failed. Probe timing is a production
            # tradeoff: faster detection helps recovery, but overly aggressive values
            # create false alarms during normal load.
            timeoutSeconds: 3

# =============================================================================
# KEY IDEA
#
# While startupProbe is still failing, Kubernetes suppresses liveness and
# readiness checks. This prevents slow-but-healthy applications from being
# restarted before they finish booting.
# =============================================================================
