# =============================================================================
# FILE:    pod-using-config.yaml
# KIND:    Pod
# PURPOSE: Demonstrate how a workload consumes ConfigMaps and Secrets as
#          environment variables and mounted files.
# WHEN:    setup/06-configmaps-secrets - after applying app-configmap.yaml and
#          app-secret.yaml.
# ENTERPRISE EQUIVALENT: Production workloads usually use Deployments instead
#                        of standalone Pods, but the env and volume syntax shown
#                        here is exactly the same inside a Deployment pod template
#                        on EKS, GKE, AKS, or bare-metal Kubernetes.
# =============================================================================

apiVersion: v1
kind: Pod

metadata:
  # CONFIGURATION EXPLANATION `config-demo` is the Kubernetes API name for this Pod. Humans and automation use
  # this name in kubectl commands, audit logs, and incident runbooks, so changing it
  # must be deliberate and coordinated with scripts that reference it.
  name: config-demo
  # CONFIGURATION EXPLANATION `applications` is the namespace where this object is stored. A namespace is a
  # named boundary inside one cluster for permissions, quotas, network rules, and
  # cleanup; putting this object in the wrong namespace makes selectors and scripts
  # miss it.
  namespace: applications
  labels:
    # CONFIGURATION EXPLANATION `app: config-demo` is a label used as a matching contract. Deployment selectors,
    # pod template labels, and Service selectors must agree on this value, or
    # Kubernetes will create objects that cannot find the pods they are supposed to
    # manage or route to.
    app: config-demo
    tier: learning
    app.kubernetes.io/name: config-demo
    app.kubernetes.io/component: configuration-consumer
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Teaching pod that consumes ConfigMaps and Secrets."

spec:
  restartPolicy: Always

  containers:
    - name: nginx
      # CONFIGURATION EXPLANATION `nginx:1.25.4` is the container image that will run in the pod. The tag is
      # part of the release decision: production teams avoid unpinned `latest` images
      # so rollbacks, audits, and vulnerability scans know exactly which artifact was
      # deployed.
      image: nginx:1.25.4
      # CONFIGURATION EXPLANATION `IfNotPresent` tells kubelet when to pull the image from a registry. In this
      # lab it avoids unnecessary downloads; in production the pull policy is chosen
      # together with immutable image tags so deployments are both repeatable and
      # fresh when intended.
      imagePullPolicy: IfNotPresent

      ports:
        - name: http
          # CONFIGURATION EXPLANATION `80` is the port the process inside the container listens on. A Service
          # targetPort or probe must point here; if the numbers do not line up, the
          # pod can be running while traffic still fails.
          containerPort: 80

      # CONFIGURATION EXPLANATION `resources` lists the object types this permission applies to, such as pods,
      # services, or secrets. Least privilege means naming only the resources the
      # workload actually needs, not granting access to everything.
      resources:
        # CONFIGURATION EXPLANATION Resource requests are the minimum CPU and memory the scheduler reserves for
        # this container. They affect which node the pod can land on and form the
        # baseline used by autoscaling, capacity planning, and cost forecasting.
        requests:
          # This is intentionally small for a 16 GB Windows 11 + Docker Desktop
          # + kind learning machine.
          # CONFIGURATION EXPLANATION `50m` is a CPU amount; `100m` means one tenth of one CPU core. Requests
          # reserve scheduling capacity, while limits cap usage, so the same-looking
          # field can mean either baseline capacity or a hard ceiling depending on its
          # parent section.
          cpu: "50m"
          # CONFIGURATION EXPLANATION `64Mi` is a memory amount. Memory is not compressible like CPU: if a
          # container exceeds its memory limit, Kubernetes may kill it, so production
          # teams set this from observed usage plus headroom.
          memory: "64Mi"
        # CONFIGURATION EXPLANATION Resource limits are the maximum CPU and memory this container is allowed to
        # use. They protect the node and neighboring pods from one workload consuming
        # everything, which is a core multi-tenant production safety rule.
        limits:
          # CONFIGURATION EXPLANATION `200m` is a CPU amount; `100m` means one tenth of one CPU core. Requests
          # reserve scheduling capacity, while limits cap usage, so the same-looking
          # field can mean either baseline capacity or a hard ceiling depending on its
          # parent section.
          cpu: "200m"
          # CONFIGURATION EXPLANATION `128Mi` is a memory amount. Memory is not compressible like CPU: if a
          # container exceeds its memory limit, Kubernetes may kill it, so production
          # teams set this from observed usage plus headroom.
          memory: "128Mi"

      env:
        # ConfigMap values are appropriate for non-sensitive runtime settings.
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: inference-gateway-runtime-config
              key: APP_ENV
              optional: false

        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: inference-gateway-runtime-config
              key: LOG_LEVEL
              optional: false

        # This value comes from the Service module. The app calls stable Service
        # DNS, not pod IPs that disappear during normal Deployment operations.
        - name: RISK_PROFILE_API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: inference-gateway-runtime-config
              key: RISK_PROFILE_API_BASE_URL
              optional: false

        - name: BACKEND_TIMEOUT_MS
          valueFrom:
            configMapKeyRef:
              name: inference-gateway-runtime-config
              key: BACKEND_TIMEOUT_MS
              optional: false

        # Secret values use secretKeyRef. Kubernetes decodes the stored Secret
        # data before exposing it to the container.
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: inference-gateway-runtime-secrets
              key: API_TOKEN
              optional: false

        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: inference-gateway-runtime-secrets
              key: DB_USERNAME
              optional: false

      volumeMounts:
        # Mount structured non-sensitive config as files.
        - name: gateway-config-volume
          # CONFIGURATION EXPLANATION `mountPath: /etc/gateway/config` controls persistent storage behavior.
          # Storage settings decide where data appears in the container, how much
          # durable capacity is requested, and which storage backend provides it in
          # production.
          mountPath: /etc/gateway/config
          readOnly: true

        # Mount only selected Secret keys as files. Mounting fewer keys reduces
        # accidental exposure inside the container filesystem.
        - name: gateway-secret-volume
          # CONFIGURATION EXPLANATION `mountPath: /etc/gateway/secrets` controls persistent storage behavior.
          # Storage settings decide where data appears in the container, how much
          # durable capacity is requested, and which storage backend provides it in
          # production.
          mountPath: /etc/gateway/secrets
          readOnly: true

  volumes:
    - name: gateway-config-volume
      configMap:
        name: inference-gateway-runtime-config
        items:
          - key: gateway-runtime.yaml
            # CONFIGURATION EXPLANATION `gateway-runtime.yaml` is the HTTP path Kubernetes calls for this check.
            # The application team owns what this endpoint means; production readiness
            # endpoints should verify serving ability, while liveness endpoints should
            # stay simple enough to avoid false restarts.
            path: gateway-runtime.yaml
            mode: 0444

    - name: gateway-secret-volume
      secret:
        secretName: inference-gateway-runtime-secrets
        items:
          - key: DB_USERNAME
            # CONFIGURATION EXPLANATION `db-username` is the HTTP path Kubernetes calls for this check. The
            # application team owns what this endpoint means; production readiness
            # endpoints should verify serving ability, while liveness endpoints should
            # stay simple enough to avoid false restarts.
            path: db-username
            mode: 0444
          - key: DB_PASSWORD
            # CONFIGURATION EXPLANATION `db-password` is the HTTP path Kubernetes calls for this check. The
            # application team owns what this endpoint means; production readiness
            # endpoints should verify serving ability, while liveness endpoints should
            # stay simple enough to avoid false restarts.
            path: db-password
            mode: 0400
          - key: DB_CONNECTION_STRING
            # CONFIGURATION EXPLANATION `db-connection-string` is the HTTP path Kubernetes calls for this check.
            # The application team owns what this endpoint means; production readiness
            # endpoints should verify serving ability, while liveness endpoints should
            # stay simple enough to avoid false restarts.
            path: db-connection-string
            mode: 0400

# =============================================================================
# WHAT TO NOTICE
#
# 1. If the ConfigMap or Secret is missing, this pod will not start. That is a
#    useful failure because the application should not run with partial config.
# 2. Environment variables are captured when the container starts. Updating the
#    ConfigMap or Secret later does not rewrite existing env vars.
# 3. Mounted files can update after the object changes, but the application must
#    reread the file. Kubernetes updates the file; it does not restart the app.
# =============================================================================
