# =============================================================================
# FILE:    pod-using-config.yaml
# KIND:    Pod
# PURPOSE: Demonstrate how a workload consumes ConfigMaps and Secrets as
#          environment variables and mounted files.
# WHEN:    setup/06-configmaps-secrets - after applying app-configmap.yaml and
#          app-secret.yaml.
# ENTERPRISE EQUIVALENT: Production workloads usually use Deployments instead
#                        of standalone Pods, but the env and volume syntax shown
#                        here is exactly the same inside a Deployment pod template
#                        on EKS, GKE, AKS, or bare-metal Kubernetes.
# =============================================================================

apiVersion: v1
kind: Pod

metadata:
  name: config-demo
  namespace: applications
  labels:
    app: config-demo
    tier: learning
    app.kubernetes.io/name: config-demo
    app.kubernetes.io/component: configuration-consumer
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Teaching pod that consumes ConfigMaps and Secrets."

spec:
  restartPolicy: Always

  containers:
    - name: nginx
      image: nginx:1.25.4
      imagePullPolicy: IfNotPresent

      ports:
        - name: http
          containerPort: 80

      resources:
        requests:
          # This is intentionally small for a 16 GB Windows 11 + Docker Desktop
          # + kind learning machine.
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"

      env:
        # ConfigMap values are appropriate for non-sensitive runtime settings.
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: inference-gateway-runtime-config
              key: APP_ENV
              optional: false

        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: inference-gateway-runtime-config
              key: LOG_LEVEL
              optional: false

        # This value comes from the Service module. The app calls stable Service
        # DNS, not pod IPs that disappear during normal Deployment operations.
        - name: RISK_PROFILE_API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: inference-gateway-runtime-config
              key: RISK_PROFILE_API_BASE_URL
              optional: false

        - name: BACKEND_TIMEOUT_MS
          valueFrom:
            configMapKeyRef:
              name: inference-gateway-runtime-config
              key: BACKEND_TIMEOUT_MS
              optional: false

        # Secret values use secretKeyRef. Kubernetes decodes the stored Secret
        # data before exposing it to the container.
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: inference-gateway-runtime-secrets
              key: API_TOKEN
              optional: false

        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: inference-gateway-runtime-secrets
              key: DB_USERNAME
              optional: false

      volumeMounts:
        # Mount structured non-sensitive config as files.
        - name: gateway-config-volume
          mountPath: /etc/gateway/config
          readOnly: true

        # Mount only selected Secret keys as files. Mounting fewer keys reduces
        # accidental exposure inside the container filesystem.
        - name: gateway-secret-volume
          mountPath: /etc/gateway/secrets
          readOnly: true

  volumes:
    - name: gateway-config-volume
      configMap:
        name: inference-gateway-runtime-config
        items:
          - key: gateway-runtime.yaml
            path: gateway-runtime.yaml
            mode: 0444

    - name: gateway-secret-volume
      secret:
        secretName: inference-gateway-runtime-secrets
        items:
          - key: DB_USERNAME
            path: db-username
            mode: 0444
          - key: DB_PASSWORD
            path: db-password
            mode: 0400
          - key: DB_CONNECTION_STRING
            path: db-connection-string
            mode: 0400

# =============================================================================
# WHAT TO NOTICE
#
# 1. If the ConfigMap or Secret is missing, this pod will not start. That is a
#    useful failure because the application should not run with partial config.
# 2. Environment variables are captured when the container starts. Updating the
#    ConfigMap or Secret later does not rewrite existing env vars.
# 3. Mounted files can update after the object changes, but the application must
#    reread the file. Kubernetes updates the file; it does not restart the app.
# =============================================================================
