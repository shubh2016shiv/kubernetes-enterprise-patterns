# =============================================================================
# FILE:    app-configmap.yaml
# KIND:    ConfigMap
# PURPOSE: Store non-sensitive runtime settings for the config demo pod without
#          baking those settings into the container image.
# WHEN:    setup/06-configmaps-secrets - after Services have introduced stable
#          DNS names for the gateway/backend application graph.
# ENTERPRISE EQUIVALENT: The same ConfigMap pattern works on EKS, GKE, and AKS.
#                        Enterprise teams usually manage it through GitOps and
#                        keep one value set per environment.
# =============================================================================

apiVersion: v1
kind: ConfigMap

metadata:
  name: inference-gateway-runtime-config
  namespace: applications
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/component: runtime-configuration
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Non-sensitive runtime config used to teach ConfigMap injection."

data:
  # APP_ENV is non-sensitive. It tells the same container image whether it is
  # running as a local development, staging, or production instance.
  APP_ENV: "development"

  # LOG_LEVEL is safe in a ConfigMap because it does not grant access to systems.
  # In production, teams often raise or lower this during incident response.
  LOG_LEVEL: "info"

  # LOCAL: The gateway should call the backend through the Service created in
  # setup/05-services, not through a pod IP from setup/04-deployments.
  # ENTERPRISE: This would often be an internal DNS name, service mesh hostname,
  # or platform service discovery name on EKS, GKE, or AKS.
  RISK_PROFILE_API_BASE_URL: "http://risk-profile-api-clusterip/profile/rules"

  # Feature flags are configuration because they change behavior without
  # changing code. They are safe here only when they do not reveal secrets.
  FEATURE_FLAG_VERBOSE_DEPENDENCY_CHECK: "true"

  # Timeouts and retry counts belong outside the image because each environment
  # has different latency and reliability characteristics.
  BACKEND_TIMEOUT_MS: "3000"
  BACKEND_MAX_RETRIES: "2"

  # ConfigMaps can also carry whole files. The key becomes the filename when it
  # is mounted through a volume in the pod spec.
  gateway-runtime.yaml: |
    # Runtime settings for the teaching gateway.
    #
    # Why this is a file:
    #   Larger applications often load structured config from YAML, TOML, JSON,
    #   or properties files instead of dozens of environment variables.
    #
    # Enterprise equivalent:
    #   A platform team may keep this file in Git, sync it with Argo CD or Flux,
    #   and promote different values through dev, staging, and prod.
    app:
      environment: development
      logLevel: info
    backend:
      baseUrl: http://risk-profile-api-clusterip/profile/rules
      timeoutMs: 3000
      maxRetries: 2
    observability:
      metricsEnabled: true
      metricsPort: 9090
