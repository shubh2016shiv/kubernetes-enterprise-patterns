# =============================================================================
# FILE:    app-secret.yaml
# KIND:    Secret
# PURPOSE: Store fake sensitive runtime values so the learner can see how pods
#          consume credentials without hard-coding them in images or manifests.
# WHEN:    setup/06-configmaps-secrets - after ConfigMaps introduce non-sensitive
#          externalized configuration.
# ENTERPRISE EQUIVALENT: Native Secrets are the Kubernetes foundation, but real
#                        platforms usually source values from AWS Secrets Manager,
#                        GCP Secret Manager, Azure Key Vault, or HashiCorp Vault.
# =============================================================================

apiVersion: v1
kind: Secret

# Opaque is the generic key/value Secret type. Kubernetes also has specialized
# types for TLS certificates, container registry credentials, and service account
# tokens.
type: Opaque

metadata:
  name: inference-gateway-runtime-secrets
  namespace: applications
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/component: runtime-secrets
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Fake learning-only credentials. Do not use real secrets here."
    enterprise-source-of-truth: "Use a vault or External Secrets Operator in production."

# stringData lets humans write plain text while Kubernetes stores the values in
# the Secret's base64-encoded data field. Base64 is encoding, not encryption.
# These values are intentionally fake so this repository remains safe to commit.
stringData:
  API_TOKEN: "fake-local-api-token-for-learning-only"
  DB_USERNAME: "demo_user"
  DB_PASSWORD: "fake-db-password-do-not-use"
  DB_CONNECTION_STRING: "postgresql://demo_user:fake-db-password-do-not-use@postgres.internal:5432/risk"

# =============================================================================
# SECURITY NOTES
#
# LOCAL LAB:
#   These values are fake and exist only so the learner can inspect Secret
#   consumption patterns.
#
# ENTERPRISE:
#   - Do not commit real credentials to Git as plain Secret YAML.
#   - Enable etcd encryption at rest on clusters that store Kubernetes Secrets.
#   - Restrict `get`, `list`, and `watch` permissions on Secrets with RBAC.
#   - Prefer external secret managers for rotation, auditing, and break-glass
#     access workflows.
# =============================================================================
