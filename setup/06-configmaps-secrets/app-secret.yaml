# =============================================================================
# FILE: 06-configmaps-secrets/app-secret.yaml
# PURPOSE: Kubernetes Secret — for sensitive configuration values.
#
# WHAT IS A SECRET?
#   A Secret is structurally similar to a ConfigMap but designed for
#   sensitive data. Key differences:
#
#   1. VALUES ARE BASE64 ENCODED (NOT encrypted — just encoded!)
#      Base64 is NOT security. "aGVsbG8=" decodes to "hello" trivially.
#      The encoding just avoids YAML parsing issues with special characters.
#      Anyone with kubectl get secret can decode the values.
#
#   2. ETCD AT-REST ENCRYPTION:
#      In enterprise, K8s clusters enable EncryptionConfiguration to encrypt
#      Secret values IN ETCD (the cluster database). Without this, Secrets
#      in etcd are stored as plain base64 — just as readable as ConfigMaps.
#      AWS EKS + KMS: encrypts etcd automatically.
#
#   3. RBAC ISOLATION:
#      You can restrict who can `get secrets` much more tightly than ConfigMaps.
#      Even if an engineer can view pods, they may not be able to read Secrets.
#
# ENTERPRISE SECRET MANAGEMENT REALITY:
#   Most mature enterprises do NOT store real secrets in K8s Secrets at all.
#   Instead:
#   - HashiCorp Vault: Vault Agent Injector → mounts secrets as files in pods
#   - AWS Secrets Manager: aws-secrets-manager CSI driver → mounts as volumes
#   - External Secrets Operator: reads from cloud vaults, creates K8s Secrets
#   - Sealed Secrets (Bitnami): encrypts secrets before putting in Git (GitOps)
#
#   For this learning environment: we use native K8s Secrets which is the
#   foundational concept before learning the enterprise patterns above.
#
# BASE64 ENCODING COMMANDS:
#   Encode: echo -n "my-password" | base64      → bXktcGFzc3dvcmQ=
#   Decode: echo "bXktcGFzc3dvcmQ=" | base64 -d → my-password
#   The -n flag prevents adding a trailing newline to the encoded value.
# =============================================================================

apiVersion: v1
kind: Secret

# type: There are several built-in Secret types:
#   Opaque:              Generic key-value data (default, most common)
#   kubernetes.io/tls:   TLS certificate and key pair
#   kubernetes.io/dockerconfigjson: Docker registry auth (image pull secrets)
#   kubernetes.io/service-account-token: ServiceAccount tokens (auto-generated)
type: Opaque

metadata:
  name: nginx-app-secrets
  namespace: applications
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/component: secrets
  annotations:
    description: "Application secrets for nginx demo. In enterprise, use Vault or ESO."
    # Document the source of truth for these values in enterprise
    # vault-path: "secret/applications/nginx"
    # managed-by: "external-secrets-operator"

# data: Base64-encoded values
# These are the ENCODED values. The pod sees them DECODED.
# Kubernetes decodes them automatically before injecting as env vars or files.
#
# ⚠ IMPORTANT: DO NOT commit real credentials to git.
#   The values below are FAKE example values for learning only.
#   Use .gitignore or sealed-secrets for real credentials.
data:
  # echo -n "admin" | base64 → YWRtaW4=
  DB_USERNAME: YWRtaW4=

  # echo -n "P@ssw0rd-super-secret-123!" | base64 → UEBzc3cwcmQtc3VwZXItc2VjcmV0LTEyMyE=
  DB_PASSWORD: UEBzc3cwcmQtc3VwZXItc2VjcmV0LTEyMyE=

  # echo -n "https://db.internal:5432/appdb" | base64
  DB_CONNECTION_STRING: aHR0cHM6Ly9kYi5pbnRlcm5hbDo1NDMyL2FwcGRi

  # echo -n "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9..." | base64
  # (truncated JWT token example)
  API_TOKEN: ZXlKaGJHY2lPaUpTVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5

# stringData: Plain text (K8s encodes it for you before storing)
# Use stringData when you don't want to pre-encode values manually.
# K8s merges stringData into data after encoding.
# DO NOT use both data and stringData for the same key.
stringData:
  # This is stored as base64 but you write it as plain text
  # Useful for multi-line values like PEM certificates
  REDIS_URL: "redis://:P@ssw0rd@redis-service:6379/0"

  # TLS certificate content (multi-line, awkward to base64 manually)
  # In enterprise: cert-manager generates these automatically
  # The "|" means "literal block" — preserve newlines exactly as written
  # tls.crt: |
  #   -----BEGIN CERTIFICATE-----
  #   MIIDXTCCAkWgAwIBAgIJAKlpEFjz...
  #   -----END CERTIFICATE-----

# ─── VIEWING SECRETS (decode on the fly) ──────────────────────────────────────
# kubectl get secret nginx-app-secrets -n applications -o yaml
# → Shows base64-encoded values
#
# Decode a specific field:
# kubectl get secret nginx-app-secrets -n applications \
#   -o jsonpath='{.data.DB_PASSWORD}' | base64 -d
#
# View all decoded fields (one-liner):
# kubectl get secret nginx-app-secrets -n applications \
#   -o go-template='{{range $k,$v := .data}}{{$k}}: {{$v | base64decode}}{{"\n"}}{{end}}'
#
# ─── ENTERPRISE SECRET ROTATION ────────────────────────────────────────────────
# When a password is rotated:
#   1. Update the Secret: kubectl apply -f updated-secret.yaml
#   2. Pods using it as env vars: MUST RESTART to see new values
#      (env vars are injected at pod creation, not live-updated)
#   3. Pods using it as a volume: the mounted file AUTOMATICALLY updates
#      (K8s syncs secret volume mounts within ~30-60 seconds — the kubelet sync period)
#   → This is why enterprise prefers secrets-as-files over secrets-as-env-vars
#      for long-lived connections that need rotation without restarts.
