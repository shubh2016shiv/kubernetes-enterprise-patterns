# =============================================================================
# FILE:    role.yaml
# KIND:    Role
# PURPOSE: Grant a workload identity read-only visibility into non-sensitive
#          application resources inside one namespace.
# WHEN:    setup/07-rbac - after creating inference-gateway-observer-sa.
# ENTERPRISE EQUIVALENT: Namespace-scoped Roles are the default pattern for app
#                        teams on EKS, GKE, and AKS because they limit blast
#                        radius to one namespace.
# =============================================================================

apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: gateway-observer
  namespace: applications
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/component: rbac-role
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Read-only visibility for pods, Services, endpoints, and ConfigMaps."

rules:
  - apiGroups: [""]
    # pods/log is a subresource. It is separate from pods because reading logs
    # can expose application data, stack traces, and sometimes accidental secrets.
    resources: ["pods", "pods/log"]
    # get reads one named object. list reads many objects. watch streams changes.
    # This is enough for dashboards and troubleshooting, but not for mutation.
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    # Services and endpoints are safe for this observer because they reveal
    # routing state, not credentials.
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    # ConfigMaps from setup/06-configmaps-secrets contain non-sensitive runtime
    # settings, so this observer can inspect them.
    resources: ["configmaps"]
    verbs: ["get", "list"]

# =============================================================================
# WHY SECRETS ARE MISSING
#
# Kubernetes RBAC has no deny rule. Permissions are additive. The way to deny
# Secret access is to avoid granting `secrets` in any Role or ClusterRole bound
# to this identity.
#
# This Role intentionally does NOT include:
#   resources: ["secrets"]
#
# That means:
#   kubectl auth can-i get secrets --as=system:serviceaccount:applications:inference-gateway-observer-sa -n applications
# should return:
#   no
# =============================================================================
