# =============================================================================
# FILE: 07-rbac/service-account.yaml
# PURPOSE: ServiceAccount — the Kubernetes identity for Pod workloads.
#
# WHAT IS A SERVICE ACCOUNT?
#   In Kubernetes, identity is not just for humans. Every Pod that runs code
#   has an identity too — a ServiceAccount. It answers the question:
#   "WHO is this Pod? What is it allowed to do?"
#
#   By default, every Pod uses the "default" ServiceAccount in its namespace.
#   This is an enterprise anti-pattern because:
#     - All pods in a namespace share the same identity
#     - You can't apply granular permissions (least-privilege)
#     - Audit logs don't tell you WHICH app took an action
#
# ENTERPRISE RBAC ARCHITECTURE (Role-Based Access Control):
#
#   ServiceAccount  ←── Identity of the Pod
#       ↓
#   RoleBinding     ←── Connects the identity to permissions
#       ↓
#   Role            ←── Defines WHAT actions are allowed
#       ↓
#   Resources       ←── K8s resources (pods, secrets, configmaps, deployments...)
#
# WHEN DOES A POD NEED K8S API ACCESS?
#   - Kubernetes operators (watches resources, creates/updates them)
#   - CI/CD agents (Tekton, ArgoCD, Flux)
#   - Monitoring agents (Prometheus, Datadog)
#   - Vault Agent Injector (watches pods, injects secrets)
#   - Custom admission webhooks
#   - Most regular apps: do NOT need API access
#
# LEAST PRIVILEGE PRINCIPLE:
#   Create a new ServiceAccount per application component.
#   Grant ONLY the specific permissions that component needs.
#   NEVER grant cluster-admin to application pods.
# =============================================================================

# ─── SERVICE ACCOUNT ─────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  # Convention: {app-name}-sa
  name: nginx-service-account
  namespace: applications
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/component: service-account
  annotations:
    description: "Identity for the nginx application pods"

    # ENTERPRISE: AWS EKS IRSA (IAM Roles for Service Accounts)
    # This annotation allows pods using this SA to assume an AWS IAM role.
    # No more static AWS access keys in Secrets — credentials are dynamic.
    # eks.amazonaws.com/role-arn: "arn:aws:iam::123456789:role/nginx-s3-read-role"

    # GKE Workload Identity (equivalent for Google Cloud)
    # iam.gke.io/gcp-service-account: "nginx@project.iam.gserviceaccount.com"

# automountServiceAccountToken: Should K8s automatically mount the SA token
# into pods using this service account?
# Default: true (a JWT token is mounted at /var/run/secrets/kubernetes.io/serviceaccount/)
#
# ENTERPRISE SECURITY RECOMMENDATION:
#   Set to false for all non-operator application pods (most apps don't call the K8s API)
#   Then explicitly set automountServiceAccountToken: true ONLY in pods that need it.
#   This prevents token theft if the pod is compromised.
automountServiceAccountToken: false

---
# ─── MONITORING SERVICE ACCOUNT ──────────────────────────────────────────────
# A separate ServiceAccount for a monitoring sidecar (e.g., Prometheus exporter)
# that DOES need to call the K8s API (to discover other pods to scrape)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-scraper-sa
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: service-account
  annotations:
    description: "Identity for Prometheus to discover and scrape pods across namespaces"
# This one DOES need to mount the token because it talks to the K8s API
automountServiceAccountToken: true
