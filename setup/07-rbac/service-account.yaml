# =============================================================================
# FILE:    service-account.yaml
# KIND:    ServiceAccount
# PURPOSE: Define workload identities used by the RBAC module.
# WHEN:    setup/07-rbac - before Roles and bindings grant permissions.
# ENTERPRISE EQUIVALENT: On EKS, GKE, and AKS, ServiceAccounts are commonly
#                        mapped to cloud IAM identities so pods can access cloud
#                        APIs without static credentials.
# =============================================================================

apiVersion: v1
kind: ServiceAccount

metadata:
  # CONFIGURATION EXPLANATION `inference-gateway-observer-sa` is the Kubernetes API name for this
  # ServiceAccount. Humans and automation use this name in kubectl commands, audit
  # logs, and incident runbooks, so changing it must be deliberate and coordinated
  # with scripts that reference it.
  name: inference-gateway-observer-sa
  # CONFIGURATION EXPLANATION `applications` is the namespace where this object is stored. A namespace is a
  # named boundary inside one cluster for permissions, quotas, network rules, and
  # cleanup; putting this object in the wrong namespace makes selectors and scripts
  # miss it.
  namespace: applications
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/component: service-account
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Read-only observer identity for the gateway learning workload."
    # ENTERPRISE AWS EKS EXAMPLE:
    # eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/inference-gateway-observer"
    # ENTERPRISE GKE EXAMPLE:
    # iam.gke.io/gcp-service-account: "inference-gateway-observer@project.iam.gserviceaccount.com"
    # ENTERPRISE AKS EXAMPLE:
    # azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"

# Most application pods do not need to call the kube-apiserver directly.
# Setting this to false prevents Kubernetes from automatically mounting an API
# token into pods that use this ServiceAccount. If a workload truly needs API
# access, make that decision explicit in the pod spec.
automountServiceAccountToken: false

---
# =============================================================================
# FILE:    service-account.yaml
# KIND:    ServiceAccount
# PURPOSE: Define a monitoring identity that can be bound to cluster-wide read
#          permissions for service discovery.
# WHEN:    setup/07-rbac - before applying clusterrolebinding.yaml.
# ENTERPRISE EQUIVALENT: Prometheus, Datadog, and security scanners often use
#                        ServiceAccounts with carefully scoped ClusterRoles.
# =============================================================================

apiVersion: v1
kind: ServiceAccount

metadata:
  # CONFIGURATION EXPLANATION `prometheus-scraper-sa` is the Kubernetes API name for this ServiceAccount. Humans
  # and automation use this name in kubectl commands, audit logs, and incident
  # runbooks, so changing it must be deliberate and coordinated with scripts that
  # reference it.
  name: prometheus-scraper-sa
  # CONFIGURATION EXPLANATION `monitoring` is the namespace where this object is stored. A namespace is a named
  # boundary inside one cluster for permissions, quotas, network rules, and cleanup;
  # putting this object in the wrong namespace makes selectors and scripts miss it.
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: service-account
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Read-only monitoring identity for cross-namespace discovery."

# Monitoring tools usually need to call the kube-apiserver to discover pods,
# Services, endpoints, and namespaces. This token should still be paired with
# read-only RBAC, never cluster-admin.
automountServiceAccountToken: true
