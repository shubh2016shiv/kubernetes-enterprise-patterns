# =============================================================================
# FILE:    clusterrolebinding.yaml
# KIND:    ClusterRoleBinding
# PURPOSE: Grant the monitoring ServiceAccount the read-only ClusterRole needed
#          for cross-namespace service discovery.
# WHEN:    setup/07-rbac - after service-account.yaml and clusterrole.yaml.
# ENTERPRISE EQUIVALENT: ClusterRoleBindings are high-impact access grants and
#                        are usually reviewed by platform or security teams.
# =============================================================================

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding

metadata:
  # CONFIGURATION EXPLANATION `prometheus-scraper-cluster-read` is the Kubernetes API name for this
  # ClusterRoleBinding. Humans and automation use this name in kubectl commands, audit
  # logs, and incident runbooks, so changing it must be deliberate and coordinated
  # with scripts that reference it.
  name: prometheus-scraper-cluster-read
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: cluster-rbac-binding
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Binds read-only cluster discovery permissions to the monitoring identity."

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  # CONFIGURATION EXPLANATION `prometheus-read-cluster-state` is the Kubernetes API name for this ClusterRole.
  # Humans and automation use this name in kubectl commands, audit logs, and incident
  # runbooks, so changing it must be deliberate and coordinated with scripts that
  # reference it.
  name: prometheus-read-cluster-state

subjects:
  - kind: ServiceAccount
    # CONFIGURATION EXPLANATION `prometheus-scraper-sa` is the Kubernetes API name for this ClusterRole. Humans
    # and automation use this name in kubectl commands, audit logs, and incident
    # runbooks, so changing it must be deliberate and coordinated with scripts that
    # reference it.
    name: prometheus-scraper-sa
    # CONFIGURATION EXPLANATION `monitoring` is the namespace where this object is stored. A namespace is a
    # named boundary inside one cluster for permissions, quotas, network rules, and
    # cleanup; putting this object in the wrong namespace makes selectors and scripts
    # miss it.
    namespace: monitoring

# =============================================================================
# IMPORTANT BOUNDARY
#
# This grants read-only visibility across the cluster to one monitoring identity.
# Do not use ClusterRoleBinding for ordinary application workloads unless there
# is a clear platform reason and a security review.
# =============================================================================
