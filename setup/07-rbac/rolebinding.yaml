# =============================================================================
# FILE:    rolebinding.yaml
# KIND:    RoleBinding
# PURPOSE: Connect the gateway observer ServiceAccount to its namespace-scoped
#          Role permissions.
# WHEN:    setup/07-rbac - after service-account.yaml and role.yaml.
# ENTERPRISE EQUIVALENT: RoleBindings are commonly managed through GitOps and
#                        reviewed like code because they grant real access.
# =============================================================================

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  # CONFIGURATION EXPLANATION `gateway-observer-binding` is the Kubernetes API name for this RoleBinding. Humans
  # and automation use this name in kubectl commands, audit logs, and incident
  # runbooks, so changing it must be deliberate and coordinated with scripts that
  # reference it.
  name: gateway-observer-binding
  # CONFIGURATION EXPLANATION `applications` is the namespace where this object is stored. A namespace is a
  # named boundary inside one cluster for permissions, quotas, network rules, and
  # cleanup; putting this object in the wrong namespace makes selectors and scripts
  # miss it.
  namespace: applications
  labels:
    app.kubernetes.io/name: inference-gateway
    app.kubernetes.io/component: rbac-binding
    app.kubernetes.io/part-of: kubernetes-fundamentals-lab
  annotations:
    description: "Grants the gateway observer identity read-only namespace visibility."

roleRef:
  # roleRef points to the permission set being granted.
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  # CONFIGURATION EXPLANATION `gateway-observer` is the Kubernetes API name for this Role. Humans and automation
  # use this name in kubectl commands, audit logs, and incident runbooks, so changing
  # it must be deliberate and coordinated with scripts that reference it.
  name: gateway-observer

subjects:
  - kind: ServiceAccount
    # subjects points to the identity receiving the permissions.
    # CONFIGURATION EXPLANATION `inference-gateway-observer-sa` is the Kubernetes API name for this Role. Humans
    # and automation use this name in kubectl commands, audit logs, and incident
    # runbooks, so changing it must be deliberate and coordinated with scripts that
    # reference it.
    name: inference-gateway-observer-sa
    # CONFIGURATION EXPLANATION `applications` is the namespace where this object is stored. A namespace is a
    # named boundary inside one cluster for permissions, quotas, network rules, and
    # cleanup; putting this object in the wrong namespace makes selectors and scripts
    # miss it.
    namespace: applications

# =============================================================================
# RBAC GRAPH
#
# ServiceAccount/inference-gateway-observer-sa
#   -> RoleBinding/gateway-observer-binding
#   -> Role/gateway-observer
#   -> read pods, logs, Services, endpoints, and ConfigMaps in applications
# =============================================================================
