# =============================================================================
# FILE:    04-inference-secret-placeholder.yaml
# KIND:    Secret
# PURPOSE: Placeholder for inference API secrets. In this local lab, the MLflow
#          server has no authentication and no database credentials are needed.
#          This file documents WHERE credentials would live in a production setup
#          and ensures the deployment is wired correctly for when auth is added.
# WHEN:    ml-inferencing module — apply before the Deployment if you add
#          real credentials. Otherwise this is documentation only.
# ENTERPRISE EQUIVALENT: In production, this Secret would be populated by:
#   - External Secrets Operator pulling from AWS Secrets Manager
#   - Vault Agent Injector reading from HashiCorp Vault
#   - Sealed Secrets decrypting a GitOps-committed encrypted manifest
#   Never store real credentials in a YAML file committed to Git.
# =============================================================================

# ENTERPRISE EMPHASIS: Kubernetes Secrets are base64-encoded, not encrypted.
# Anyone with read access to the namespace can decode them. In production:
#   1. Use RBAC to restrict Secret read access to the specific ServiceAccount
#      that needs the credentials.
#   2. Use encryption at rest (Kubernetes EncryptionConfig + KMS) so secrets
#      are encrypted in etcd.
#   3. Prefer External Secrets Operator or Vault so real credentials never
#      appear in a Kubernetes manifest or a Git repository.

apiVersion: v1
kind: Secret
metadata:
  # CAN BE CHANGED: Rename the Secret if your application or external secret
  # naming standard differs. Example: `fraud-risk-inference-secrets`.
  # If changed, update any Deployment `secretKeyRef.name` entries that use it.
  name: wine-quality-inference-secrets
  # CAN BE CHANGED: Must match 01-namespace.yaml. Example: `ml-inference-dev`.
  namespace: ml-inference
  labels:
    app.kubernetes.io/name: wine-quality-inference-api
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: k8s-mlops-platform
    app.kubernetes.io/managed-by: kubectl

type: Opaque
stringData:
  # LOCAL LAB: These are placeholder values. The local MLflow server has no
  # authentication. In production, replace these with real values and inject
  # them via External Secrets Operator, not by editing this file.

  # MLflow server username (when MLflow is behind basic auth or SSO).
  # Production example: a service account username in an enterprise IdP.
  # CAN BE CHANGED: Local placeholder only. Example: `"mlflow_service_user"`.
  # Never commit a real production username if it is sensitive in your company.
  mlflow_username: "local_user_placeholder"

  # MLflow server API token or password.
  # Production example: a short-lived OAuth2 token or AWS SigV4 signed header.
  # CAN BE CHANGED: Local placeholder only. Example: `"replace_me_locally"`.
  # Never commit real tokens or passwords to Git.
  mlflow_api_token: "local_token_placeholder"

  # Note: If your MLflow setup requires authentication, add this Secret's keys
  # to the Deployment spec under env entries with secretKeyRef, and update the
  # InferenceSettings class to read MLFLOW_USERNAME and MLFLOW_API_TOKEN.
  # For the local lab, authentication is not required.
