# =============================================================================
# FILE:    03-inference-serviceaccount.yaml
# KIND:    ServiceAccount
# PURPOSE: Give the wine quality inference API its own Kubernetes workload
#          identity. Even though this local FastAPI app does not call the
#          Kubernetes API, a named ServiceAccount makes ownership, audit, and
#          future RBAC decisions explicit.
# WHEN:    ml-inferencing-fastapi module - apply after namespace and before the
#          Deployment that references this ServiceAccount.
# ENTERPRISE EQUIVALENT: In production, this ServiceAccount may be connected to
#   cloud identity through IAM Roles for Service Accounts (IRSA) on Amazon EKS,
#   Workload Identity on Google Kubernetes Engine, or Azure Workload Identity.
#   RBAC would grant only the exact Kubernetes API permissions the pod needs.
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  # CAN BE CHANGED: Rename this workload identity if the application name
  # changes. Example: `fraud-risk-inference-api`. If changed, update
  # `serviceAccountName` in 05-inference-deployment.yaml.
  name: wine-quality-inference-api
  # CAN BE CHANGED: Must match 01-namespace.yaml. Example: `ml-inference-dev`.
  namespace: ml-inference
  labels:
    app.kubernetes.io/name: wine-quality-inference-api
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: k8s-mlops-platform
    app.kubernetes.io/managed-by: kubectl

# ANTI-PATTERN TO AVOID: Do not run enterprise workloads under the namespace's
# default ServiceAccount just because it works locally. The default identity
# hides which application owns future permissions, making security reviews and
# incident investigations harder. A named ServiceAccount is the minimum identity
# boundary for a production-style Kubernetes workload.
